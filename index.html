<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hệ Thống Mầm Non Thái Dương</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(at top left, #f8fafc, #f1f5f9); }
    .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); }
    .animate-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    /* Style tối ưu riêng cho việc IN ẤN PHIẾU THU */
    @media print {
      body * { visibility: hidden; }
      #printSection, #printSection * { visibility: visible; }
      #printSection { position: absolute; left: 0; top: 0; width: 100%; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="min-h-screen text-slate-800 antialiased selection:bg-blue-500 selection:text-white">

  <div class="min-h-screen flex flex-col no-print">
    <header class="bg-gradient-to-r from-slate-900 to-blue-900 text-white shadow-xl sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="p-2 bg-white/10 rounded-2xl"><i data-lucide="sun" class="w-7 h-7 text-amber-300"></i></div>
          <div>
            <h1 class="text-xl font-extrabold tracking-tight">Mầm Non Thái Dương</h1>
            <p class="text-xs text-slate-300">Hệ thống quản lý điểm danh & tính phí tự động</p>
          </div>
        </div>
        <nav class="hidden md:flex items-center gap-1.5 bg-white/5 p-1.5 rounded-2xl">
          <button data-tab="HocSinh" class="tab-btn flex items-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold transition-all">Học Sinh</button>
          <button data-tab="GiaoVien" class="tab-btn flex items-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold transition-all">Giáo Viên</button>
          <button data-tab="ChamCong" class="tab-btn flex items-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold transition-all">Chấm Công</button>
          <button data-tab="HocPhi" class="tab-btn flex items-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold transition-all">Tính Học Phí & In Phiếu</button>
        </nav>
      </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-6">
      <div id="alertBanner" class="hidden rounded-2xl border p-4 mb-6 text-sm flex items-center gap-3 font-medium shadow-md transition-all"></div>
      <div id="contentArea" class="animate-up"></div>
    </main>
  </div>

  <div id="printSection" class="hidden p-8 bg-white text-black max-w-2xl mx-auto border-2 border-dashed border-slate-300 rounded-xl my-4"></div>

  <script>
    // Dán URL Web App Apps Script của bạn vào đây
    const API_URL = "https://script.google.com/macros/s/AKfycbz0xRM4WZ4rXV9j163iLlXD3n2mUXolILG_Z7Xbk3b01IBwST1BKrcIoBS4r96HsZKT/exec";
    
    // Cấu hình bảng giá của nhà trường
    const SCHOOL_CONFIG = {
      phiCoDinh: 1200000, // Tiền học phí cố định cơ bản/tháng
      tienAnMoiBuoi: 35000 // Tiền ăn tính theo mỗi buổi thực tế đi học
    };

    const state = {
      activeTab: 'HocSinh',
      students: [],
      teachers: [],
      attendance: [],
      tuitionRecords: [],
      loading: false
    };

    // Hàm thông báo Toast thông minh
    function showAlert(message, type = 'success') {
      const banner = document.getElementById('alertBanner');
      banner.className = `flex items-center gap-3 p-4 mb-6 rounded-2xl border text-sm font-medium shadow-sm transition-all duration-300 ${type === 'success' ? 'border-emerald-200 bg-emerald-50 text-emerald-800' : 'border-rose-200 bg-rose-50 text-rose-800'}`;
      banner.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5"></i><span>${message}</span>`;
      lucide.createIcons();
      banner.classList.remove('hidden');
      setTimeout(() => banner.classList.add('hidden'), 4000);
    }

    async function apiFetch(action) {
      const res = await fetch(`${API_URL}?action=${action}`);
      return res.json();
    }

    async function apiPush(payload) {
      const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
      return res.json();
    }

    async function syncData(tab) {
      state.loading = true;
      render();
      try {
        state.students = await apiFetch('HocSinh');
        state.teachers = await apiFetch('GiaoVien');
        state.attendance = await apiFetch('ChamCong');
        state.tuitionRecords = await apiFetch('HocPhi');
      } catch (e) { showAlert("Lỗi tải cơ sở dữ liệu từ đám mây.", "error"); }
      state.loading = false;
      render();
    }

    function changeTab(tab) {
      state.activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        const isCurrent = btn.dataset.tab === tab;
        btn.className = `tab-btn flex items-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold transition-all ${isCurrent ? 'bg-white text-slate-900 shadow-md' : 'text-slate-300 hover:bg-white/10'}`;
      });
      syncData(tab);
    }

    // 1. GIAO DIỆN HỌC SINH
    function viewHocSinh() {
      const list = state.students.map(r => `
        <div class="border border-slate-200 bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
          <div>
            <span class="text-xs bg-blue-50 text-blue-600 font-bold px-2 py-0.5 rounded-md">Lớp ${r[3]}</span>
            <h4 class="font-bold text-slate-800 text-lg mt-1">${r[1]}</h4>
            <p class="text-xs text-slate-500 mt-1">Phụ huynh: ${r[4]} | SĐT: ${r[5]}</p>
          </div>
          <span class="font-mono text-xs text-slate-400 bg-slate-50 px-2 py-1 rounded-md">ID: ${r[0]}</span>
        </div>
      `).join('');

      return `
        <div class="grid gap-6 md:grid-cols-[1fr_360px]">
          <div>
            <div class="glass rounded-3xl p-6 mb-6 flex justify-between items-center">
              <div><h2 class="text-xl font-bold">Danh Sách Học Sinh</h2><p class="text-xs text-slate-500">Dữ liệu hồ sơ gốc của học sinh toàn trường.</p></div>
              <div class="bg-blue-600 text-white px-3 py-1.5 rounded-xl text-xs font-bold">Sĩ số: ${state.students.length} bé</div>
            </div>
            <div class="grid gap-4 sm:grid-cols-2">${list || '<div class="col-span-2 text-center py-12 text-slate-400">Trống. Vui lòng thêm học sinh mới ở form bên cạnh.</div>'}</div>
          </div>
          <div class="glass rounded-3xl p-6 border h-fit">
            <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="plus-circle" class="text-blue-600"></i>Tiếp nhận bé mới</h3>
            <form id="f_student" class="space-y-3">
              <input name="id" placeholder="Mã định danh (Ví dụ: HS01)" required class="w-full border px-4 py-2 rounded-xl text-sm outline-none focus:border-blue-500 bg-white" />
              <input name="name" placeholder="Họ và tên bé" required class="w-full border px-4 py-2 rounded-xl text-sm outline-none focus:border-blue-500 bg-white" />
              <input name="dob" type="date" required class="w-full border px-4 py-2 rounded-xl text-sm outline-none focus:border-blue-500 bg-white" />
              <input name="class" placeholder="Lớp (Ví dụ: Mầm 1, Chồi 2)" required class="w-full border px-4 py-2 rounded-xl text-sm outline-none focus:border-blue-500 bg-white" />
              <input name="parent" placeholder="Tên cha/mẹ" required class="w-full border px-4 py-2 rounded-xl text-sm outline-none focus:border-blue-500 bg-white" />
              <input name="phone" placeholder="Số điện thoại liên hệ" required class="w-full border px-4 py-2 rounded-xl text-sm outline-none focus:border-blue-500 bg-white" />
              <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl text-sm shadow-md shadow-blue-500/10">Lưu Hồ Sơ Gốc</button>
            </form>
          </div>
        </div>
      `;
    }

    // 2. GIAO DIỆN GIÁO VIÊN
    function viewGiaoVien() {
      const list = state.teachers.map(r => `
        <div class="border border-slate-200 bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
          <div>
            <h4 class="font-bold text-slate-800 text-base">${r[1]}</h4>
            <p class="text-xs text-slate-500 mt-0.5">Phụ trách lớp: <strong class="text-slate-700">${r[3]}</strong></p>
            <p class="text-xs text-emerald-600 font-semibold mt-1">Lương: ${Number(r[4])?new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND'}).format(r[4]):r[4]}</p>
          </div>
          <span class="font-mono text-xs text-slate-400 bg-slate-50 px-2 py-1 rounded-md">ID: ${r[0]}</span>
        </div>
      `).join('');

      return `
        <div class="grid gap-6 md:grid-cols-[1fr_360px]">
          <div>
            <div class="glass rounded-3xl p-6 mb-6"><h2 class="text-xl font-bold">Danh Sách Nhân Sự</h2><p class="text-xs text-slate-500">Hồ sơ giáo viên đứng lớp phụ trách giảng dạy.</p></div>
            <div class="grid gap-4 sm:grid-cols-2">${list || '<div class="col-span-2 text-center py-12 text-slate-400">Chưa có nhân sự.</div>'}</div>
          </div>
          <div class="glass rounded-3xl p-6 border h-fit">
            <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="user-plus" class="text-slate-900"></i>Thêm nhân sự mới</h3>
            <form id="f_teacher" class="space-y-3">
              <input name="id" placeholder="Mã Giáo Viên (Ví dụ: GV01)" required class="w-full border px-4 py-2 rounded-xl text-sm outline-none focus:border-slate-900 bg-white" />
              <input name="name" placeholder="Họ và tên" required class="w-full border px-4 py-2 rounded-xl text-sm outline-none focus:border-slate-900 bg-white" />
              <input name="phone" placeholder="Số điện thoại" required class="w-full border px-4 py-2 rounded-xl text-sm outline-none focus:border-slate-900 bg-white" />
              <input name="class" placeholder="Lớp nhận phụ trách" required class="w-full border px-4 py-2 rounded-xl text-sm outline-none focus:border-slate-900 bg-white" />
              <input name="salary" type="number" placeholder="Lương cơ bản (VND)" required class="w-full border px-4 py-2 rounded-xl text-sm outline-none focus:border-slate-900 bg-white" />
              <button class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 rounded-xl text-sm">Đăng Ký Nhân Sự</button>
            </form>
          </div>
        </div>
      `;
    }

    // 3. GIAO DIỆN ĐIỂM DANH HÀNG LOẠT THEO DANH SÁCH CÓ SẴN
    let attType = 'HocSinh';
    function viewChamCong() {
      const listData = attType === 'HocSinh' ? state.students : state.teachers;
      const today = new Date().toISOString().slice(0, 10);

      const itemsHtml = listData.map((r) => `
        <div class="border border-slate-200 bg-white p-4 rounded-xl shadow-sm flex flex-col sm:flex-row justify-between sm:items-center gap-3">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center font-mono text-xs text-slate-500 font-bold">${r[0]}</div>
            <span class="font-bold text-slate-800">${r[1]}</span>
          </div>
          <div class="flex gap-1 bg-slate-100 p-1 rounded-xl self-end sm:self-auto">
            ${['Đi học', 'Nghỉ có phép', 'Vắng'].map(st => `
              <label class="text-xs px-3 py-1.5 rounded-lg cursor-pointer transition font-medium has-[:checked]:bg-amber-500 has-[:checked]:text-white has-[:checked]:font-bold">
                <input type="radio" name="att-${r[0]}" value="${st}" class="hidden" ${st==='Đi học'?'checked':''} /> ${st}
              </label>
            `).join('')}
          </div>
        </div>
      `).join('');

      return `
        <div class="max-w-3xl mx-auto space-y-6">
          <div class="glass rounded-3xl p-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div><h2 class="text-xl font-bold">Sổ Điểm Danh Điện Tử</h2><p class="text-xs text-slate-500">Tích chọn nhanh trạng thái hiện diện hàng ngày.</p></div>
            <div class="flex gap-2 bg-slate-100 p-1 rounded-xl">
              <button onclick="attType='HocSinh'; render();" class="px-4 py-1.5 text-xs font-bold rounded-lg transition ${attType==='HocSinh'?'bg-slate-900 text-white':'text-slate-600'}">Học Sinh</button>
              <button onclick="attType='GiaoVien'; render();" class="px-4 py-1.5 text-xs font-bold rounded-lg transition ${attType==='GiaoVien'?'bg-slate-900 text-white':'text-slate-600'}">Giáo Viên</button>
            </div>
          </div>
          <form id="f_attendance" class="glass rounded-3xl p-6 border space-y-4">
            <div class="w-fit">
              <label class="text-xs font-bold text-slate-400 block uppercase mb-1">Ngày Chấm Công</label>
              <input type="date" id="attDate" value="${today}" required class="border px-4 py-2 rounded-xl text-sm outline-none font-bold text-slate-800 bg-white" />
            </div>
            <div class="space-y-2 max-h-[400px] overflow-y-auto pr-1">${itemsHtml || '<p class="text-center py-6 text-slate-400">Không có đối tượng dữ liệu.</p>'}</div>
            <button class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-xl text-sm shadow-md shadow-amber-500/10">Lưu Toàn Bộ Bảng Điểm Danh</button>
          </form>
        </div>
      `;
    }

    // 4. GIAO DIỆN TỰ ĐỘNG TÍNH TOÁN & IN BIÊN LAI CUỐI THÁNG
    function viewHocPhi() {
      // Đổ danh sách học sinh vào thẻ Select chọn nhanh
      const selectOptions = state.students.map(r => `<option value="${r[0]}">${r[0]} - ${r[1]}</option>`).join('');

      // Danh sách hóa đơn hiện tại trong sheet
      const tableRows = state.tuitionRecords.map((r, index) => {
        const isPaid = r[7] === 'Đã nộp';
        return `
          <tr class="border-b last:border-0 hover:bg-slate-50/80 transition-all text-sm">
            <td class="px-4 py-3 font-semibold text-slate-600">${r[0]}</td>
            <td class="px-4 py-3 font-bold text-slate-800">${r[2]}</td>
            <td class="px-4 py-3 text-center text-emerald-600 font-bold">${r[3]}</td>
            <td class="px-4 py-3 text-center text-rose-500 font-bold">${r[4]}</td>
            <td class="px-4 py-3 font-extrabold text-slate-900">${new Intl.NumberFormat('vi-VN').format(r[6])} đ</td>
            <td class="px-4 py-3">
              <span class="px-2 py-0.5 rounded-full text-xs font-bold ${isPaid?'bg-emerald-50 text-emerald-700':'bg-rose-50 text-rose-700'}">${r[7]}</span>
            </td>
            <td class="px-4 py-3 text-right space-x-2">
              <button onclick="triggerUpdateInvoice(${index})" class="px-2.5 py-1 text-xs rounded-lg border bg-white font-medium hover:bg-slate-100">${isPaid?'Hủy nộp':'Thu tiền'}</button>
              <button onclick="printInvoiceOffline(${index})" class="px-2.5 py-1 text-xs rounded-lg bg-slate-900 text-white font-bold hover:bg-slate-800"><i data-lucide="printer" class="w-3 h-3 inline mr-1"></i>In phiếu</button>
            </td>
          </tr>
        `;
      }).join('');

      return `
        <div class="grid gap-6 lg:grid-cols-[1fr_380px]">
          <div class="space-y-6">
            <div class="glass rounded-3xl p-6 flex justify-between items-center">
              <div><h2 class="text-xl font-bold">Báo Cáo Học Phí & Biên Lai</h2><p class="text-xs text-slate-500">Bảng theo dõi đối soát và in phiếu nhanh cuối tháng.</p></div>
              <div class="text-slate-500 text-xs font-mono bg-slate-100 px-3 py-1.5 rounded-xl">Đơn giá định cấu hình: <strong class="text-slate-900">Cố định ${new Intl.NumberFormat('vi-VN').format(SCHOOL_CONFIG.phiCoDinh)}đ</strong> + <strong class="text-slate-900">Tiền ăn ${new Intl.NumberFormat('vi-VN').format(SCHOOL_CONFIG.tienAnMoiBuoi)}đ/buổi</strong></div>
            </div>
            <div class="glass rounded-3xl border overflow-x-auto">
              <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                  <tr class="bg-slate-50 text-slate-400 text-xs uppercase font-bold border-b">
                    <th class="px-4 py-3">Tháng</th><th class="px-4 py-3">Học Sinh</th><th class="px-4 py-3 text-center">Đi học</th><th class="px-4 py-3 text-center">Nghỉ</th><th class="px-4 py-3">Tổng Thu</th><th class="px-4 py-3">Trạng thái</th><th class="px-4 py-3"></th>
                  </tr>
                </thead>
                <tbody class="divide-y bg-white">${tableRows || '<tr><td colspan="7" class="text-center py-12 text-slate-400">Chưa xuất biên lai học phí nào.</td></tr>'}</tbody>
              </table>
            </div>
          </div>

          <div class="glass rounded-3xl p-6 border h-fit sticky top-24">
            <h3 class="font-bold mb-1 flex items-center gap-2"><i data-lucide="calculator" class="text-violet-600"></i>Tính toán tự động cuối tháng</h3>
            <p class="text-[11px] text-slate-400 mb-4">Hệ thống sẽ tự quét lịch sử điểm danh của tháng để đếm buổi.</p>
            <form id="f_calc_tuition" class="space-y-3">
              <div>
                <label class="text-xs font-bold text-slate-400 block uppercase mb-1">Tháng tính học phí</label>
                <input name="month" type="month" required class="w-full border px-4 py-2 rounded-xl text-sm font-semibold outline-none focus:border-violet-500 bg-white" />
              </div>
              <div>
                <label class="text-xs font-bold text-slate-400 block uppercase mb-1">Chọn Học Sinh</label>
                <select name="id" id="calc_student_select" required class="w-full border px-3 py-2 rounded-xl text-sm font-semibold outline-none focus:border-violet-500 bg-white">
                  <option value="">Chọn một bé...</option>${selectOptions}
                </select>
              </div>
              
              <div id="calcPreviewBox" class="hidden rounded-xl bg-slate-900 text-slate-200 p-4 font-mono text-xs space-y-1.5 shadow-inner">
                <div class="flex justify-between"><span>Số ngày đi học:</span><span id="p_di_hoc" class="text-emerald-400 font-bold">0 buổi</span></div>
                <div class="flex justify-between border-b border-white/10 pb-1.5"><span>Số ngày nghỉ:</span><span id="p_nghi" class="text-rose-400 font-bold">0 buổi</span></div>
                <div class="flex justify-between"><span>Học phí cơ bản:</span><span id="p_co_dinh">0đ</span></div>
                <div class="flex justify-between border-b border-white/10 pb-1.5"><span>Tiền ăn lũy kế:</span><span id="p_tien_an">0đ</span></div>
                <div class="flex justify-between font-bold text-amber-400 text-sm pt-0.5"><span>Tổng Cộng Phí:</span><span id="p_tong_tien">0đ</span></div>
              </div>

              <button type="submit" id="btnSubmitInvoice" disabled class="w-full bg-violet-600 hover:bg-violet-700 disabled:bg-slate-200 disabled:text-slate-400 text-white font-bold py-2.5 rounded-xl text-sm shadow-md flex items-center justify-center gap-2"><i data-lucide="file-plus"></i> Khởi Tạo Biên Lai</button>
            </form>
          </div>
        </div>
      `;
    }

    // ĐIỀU KHIỂN LOGIC TÍNH TOÁN BÊN TRONG BIÊN LAI (PHÍA CLIENT)
    let tempCalculatedRow = null; 
    function hookTuitionCalculation() {
      const form = document.getElementById('f_calc_tuition');
      if (!form) return;
      
      const selectStudent = document.getElementById('calc_student_select');
      const inputMonth = form.querySelector('[name="month"]');
      const previewBox = document.getElementById('calcPreviewBox');
      const submitBtn = document.getElementById('btnSubmitInvoice');

      const triggerCalc = () => {
        const maHS = selectStudent.value;
        const thang = inputMonth.value; // Định dạng YYYY-MM
        if (!maHS || !thang) { previewBox.classList.add('hidden'); submitBtn.disabled = true; return; }

        const foundStudent = state.students.find(r => r[0] === maHS);
        if(!foundStudent) return;

        // Lọc tất cả lịch sử chấm công của học sinh này trong tháng được chọn
        const matchAtt = state.attendance.filter(r => {
          const ngayCham = r[0]; // YYYY-MM-DD
          return r[1] === maHS && ngayCham.startsWith(thang);
        });

        // Đếm số buổi
        const diHoc = matchAtt.filter(r => r[4] === 'Đi học').length;
        const nghi = matchAtt.filter(r => r[4] === 'Nghỉ có phép' || r[4] === 'Vắng').length;

        // Tính tiền dựa theo cấu hình trường
        const tongTienAn = diHoc * SCHOOL_CONFIG.tienAnMoiBuoi;
        const tongTienPhaiNop = SCHOOL_CONFIG.phiCoDinh + tongTienAn;

        // Cập nhật giao diện xem trước (Preview)
        document.getElementById('p_di_hoc').textContent = diHoc + " buổi";
        document.getElementById('p_nghi').textContent = nghi + " buổi";
        document.getElementById('p_co_dinh').textContent = new Intl.NumberFormat('vi-VN').format(SCHOOL_CONFIG.phiCoDinh) + " đ";
        document.getElementById('p_tien_an').textContent = new Intl.NumberFormat('vi-VN').format(tongTienAn) + " đ";
        document.getElementById('p_tong_tien').textContent = new Intl.NumberFormat('vi-VN').format(tongTienPhaiNop) + " đ";
        
        previewBox.classList.remove('hidden');
        submitBtn.disabled = false;

        // Đóng gói mảng để chuẩn bị đẩy lên Google Sheet
        tempCalculatedRow = [thang, maHS, foundStudent[1], SCHOOL_CONFIG.phiCoDinh, diHoc, tongTienAn, tongTienPhaiNop, 'Chưa nộp'];
      };

      selectStudent.addEventListener('change', triggerCalc);
      inputMonth.addEventListener('change', triggerCalc);
    }

    // 5. IN PHIẾU BÁO TIỀN CHO PHỤ HUYNH TẠI CHỖ (OFFLINE KHÔNG CẦN BACKEND LẠI)
    function printInvoiceOffline(index) {
      const invoice = state.tuitionRecords[index];
      if (!invoice) return;

      const pSec = document.getElementById('printSection');
      pSec.innerHTML = `
        <div style="text-align: center; margin-bottom: 20px;">
          <h2 style="font-size: 20px; font-weight: 800; uppercase">Trường Mầm Non Thái Dương</h2>
          <p style="font-size: 12px; color: #555">Hóa Đơn Thu Học Phí & Tiền Ăn Tháng: <strong>${invoice[0]}</strong></p>
          <div style="margin: 10px auto; width: 60px; border-top: 2px solid #000"></div>
        </div>
        <div style="font-size: 14px; margin-bottom: 15px; line-height: 1.6">
          <p>• Họ và tên học sinh: <strong>${invoice[2]}</strong></p>
          <p>• Mã số học sinh: <strong>${invoice[1]}</strong></p>
          <p>• Tình trạng chấm công trong tháng: Đi học <strong style="color: green">${invoice[4]} buổi</strong></p>
        </div>
        <table style="width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px;">
          <thead>
            <tr style="border-bottom: 2px solid #000; text-align: left">
              <th style="padding: 6px 0">Khoản mục chi phí</th>
              <th style="padding: 6px 0; text-align: right">Thành tiền</th>
            </tr>
          </thead>
          <tbody>
            <tr style="border-bottom: 1px dashed #ccc">
              <td style="padding: 8px 0">Học phí bán trú cố định cơ bản</td>
              <td style="padding: 8px 0; text-align: right">${new Intl.NumberFormat('vi-VN').format(invoice[3])} đ</td>
            </tr>
            <tr style="border-bottom: 2px solid #000">
              <td style="padding: 8px 0">Tiền ăn tích lũy thực tế (${invoice[4]} buổi × ${new Intl.NumberFormat('vi-VN').format(SCHOOL_CONFIG.tienAnMoiBuoi)}đ)</td>
              <td style="padding: 8px 0; text-align: right">${new Intl.NumberFormat('vi-VN').format(invoice[5])} đ</td>
            </tr>
            <tr style="font-size: 16px; font-weight: bold">
              <td style="padding: 10px 0">TỔNG TIỀN PHẢI NỘP:</td>
              <td style="padding: 10px 0; text-align: right; color: red">${new Intl.NumberFormat('vi-VN').format(invoice[6])} đ</td>
            </tr>
          </tbody>
        </table>
        <div style="margin-top: 30px; display: flex; justify-content: space-between; font-size: 12px; font-style: italic">
          <div style="text-align: center; width: 45%">Người lập phiếu<br><br><br><br>(Ký và ghi rõ họ tên)</div>
          <div style="text-align: center; width: 45%">Đại diện nhà trường xác nhận<br><br><br><br>(Đã đóng dấu thu tiền)</div>
        </div>
      `;

      pSec.classList.remove('hidden');
      window.print();
      pSec.classList.add('hidden');
    }

    // THU TIỀN NHANH / ĐỔI TRẠNG THÁI BIÊN LAI
    async function triggerUpdateInvoice(index) {
      const record = state.tuitionRecords[index];
      if (!record) return;
      const targetStatus = record[7] === 'Đã nộp' ? 'Chưa nộp' : 'Đã nộp';
      const updatedRow = [...record.slice(0, 7), targetStatus];
      state.loading = true; render();
      try {
        await apiPush({ action: 'HocPhi', subAction: 'update', rowIndex: index, rowData: updatedRow });
        showAlert("Đã thay đổi trạng thái đóng tiền.");
        syncData(state.activeTab);
      } catch (e) { showAlert("Lỗi kết nối.", "error"); state.loading = false; render(); }
    }

    // RENDER ĐỘNG KHUNG GIAO DIỆN CHÍNH
    function render() {
      const area = document.getElementById('contentArea');
      if (state.loading) {
        area.innerHTML = `<div class="glass rounded-3xl p-12 text-center text-slate-500 flex flex-col items-center justify-center gap-3"><div class="spinner w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full"></div><p class="text-xs font-semibold text-blue-600">Đang đồng bộ dữ liệu với Google Drive đám mây...</p></div>`;
        return;
      }
      if (state.activeTab === 'HocSinh') area.innerHTML = viewHocSinh();
      else if (state.activeTab === 'GiaoVien') area.innerHTML = viewGiaoVien();
      else if (state.activeTab === 'ChamCong') area.innerHTML = viewChamCong();
      else if (state.activeTab === 'HocPhi') { area.innerHTML = viewHocPhi(); hookTuitionCalculation(); }
      
      lucide.createIcons();
      bindForms();
    }

    // ĐĂNG KÝ SỰ KIỆN GỬI FORM LÊN BACKEND
    function bindForms() {
      const f_student = document.getElementById('f_student');
      if (f_student) f_student.addEventListener('submit', async (e) => {
        e.preventDefault(); const f = new FormData(e.target);
        const rowData = [f.get('id'), f.get('name'), f.get('dob'), f.get('class'), f.get('parent'), f.get('phone')];
        state.loading = true; render();
        try { await apiPush({ action: 'HocSinh', rowData }); showAlert('Thêm học sinh gốc thành công.'); changeTab('HocSinh'); } 
        catch (e) { showAlert('Thất bại', 'error'); syncData('HocSinh'); }
      });

      const f_teacher = document.getElementById('f_teacher');
      if (f_teacher) f_teacher.addEventListener('submit', async (e) => {
        e.preventDefault(); const f = new FormData(e.target);
        const rowData = [f.get('id'), f.get('name'), f.get('phone'), f.get('class'), f.get('salary')];
        state.loading = true; render();
        try { await apiPush({ action: 'GiaoVien', rowData }); showAlert('Ký hợp đồng nhân sự thành công.'); changeTab('GiaoVien'); } 
        catch (e) { showAlert('Thất bại', 'error'); syncData('GiaoVien'); }
      });

      const f_attendance = document.getElementById('f_attendance');
      if (f_attendance) f_attendance.addEventListener('submit', async (e) => {
        e.preventDefault();
        const date = document.getElementById('attDate').value;
        const listData = attType === 'HocSinh' ? state.students : state.teachers;
        
        const bulkData = listData.map(r => {
          const radio = f_attendance.querySelector(`input[name="att-${r[0]}"]:checked`);
          return [date, r[0], r[1], attType, radio ? radio.value : 'Đi học', 'Hệ thống Web'];
        });

        state.loading = true; render();
        try { await apiPush({ action: 'ChamCong', bulkData }); showAlert(`Đã lưu bảng điểm danh ngày ${date}.`); syncData('ChamCong'); } 
        catch (e) { showAlert('Gửi dữ liệu lỗi.', 'error'); syncData('ChamCong'); }
      });

      const f_calc_tuition = document.getElementById('f_calc_tuition');
      if (f_calc_tuition) f_calc_tuition.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!tempCalculatedRow) return;
        state.loading = true; render();
        try {
          await apiPush({ action: 'HocPhi', rowData: tempCalculatedRow });
          showAlert('Đã phát hành biên lai học phí tháng lên Cloud.');
          tempCalculatedRow = null;
          changeTab('HocPhi');
        } catch (e) { showAlert('Thất bại', 'error'); syncData('HocPhi'); }
      });
    }

    // Thiết lập chạy mặc định ban đầu
    document.addEventListener("DOMContentLoaded", () => changeTab('HocSinh'));
  </script>
</body>
