<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý Mầm non Thái Dương</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: light; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .brand-bg { background: linear-gradient(135deg, #56b2ff 0%, #83d0ff 100%); }
    .brand-border { border-color: #f7c948; }
    .brand-accent { color: #ff7fa3; }
    .soft-card { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(16px); }
    .status-badge { display: inline-flex; align-items: center; justify-content: center; padding: 0.35rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="min-h-screen flex flex-col">
    <header class="brand-bg text-white p-4 sm:p-6 shadow-lg shadow-slate-300/20">
      <div class="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <h1 class="text-3xl font-extrabold tracking-tight">Trường Mầm non Thái Dương</h1>
          <p class="mt-2 text-slate-100/90">Quản lý học sinh, giáo viên, chấm công, học phí và dinh dưỡng.</p>
        </div>
        <button id="mobileNavToggle" class="sm:hidden rounded-full border border-slate-200/40 bg-white/10 px-4 py-2 text-sm font-semibold transition hover:bg-white/20">Menu</button>
        <nav id="tabsNav" class="hidden sm:flex gap-2 flex-wrap items-center">
          <button data-tab="HocSinh" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Học Sinh</button>
          <button data-tab="GiaoVien" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Giáo Viên</button>
          <button data-tab="ChamCong" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Chấm Công</button>
          <button data-tab="HocPhi" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Học Phí</button>
          <button data-tab="DinhDuong" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Dinh Dưỡng</button>
        </nav>
      </div>
      <div id="mobileTabs" class="sm:hidden mt-4 hidden flex-col gap-2">
        <button data-tab="HocSinh" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Học Sinh</button>
        <button data-tab="GiaoVien" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Giáo Viên</button>
        <button data-tab="ChamCong" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Chấm Công</button>
        <button data-tab="HocPhi" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Học Phí</button>
        <button data-tab="DinhDuong" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Dinh Dưỡng</button>
      </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
      <section class="space-y-6">
        <div id="alertBanner" class="hidden rounded-3xl border border-slate-300/70 bg-white shadow-sm p-4 text-sm text-slate-700"></div>
        <div id="contentArea" class="space-y-6"></div>
      </section>
    </main>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzH66RiU7musvItOBabE5mvVaCPIFtJSmlEkAM3LZsS-DX1tdzJJ-JM3QMiQ1COjBNt/exec";
    const state = {
      activeTab: 'HocSinh',
      students: [],
      teachers: [],
      attendanceType: 'HocSinh',
      attendanceDate: new Date().toISOString().slice(0, 10),
      attendanceStatus: {},
      tuitionRecords: [],
      nutritionMenus: [],
      loading: false,
      selectedTuitionIndex: null,
    };

    const alertBanner = document.getElementById('alertBanner');
    const contentArea = document.getElementById('contentArea');
    const tabs = Array.from(document.querySelectorAll('.tab-button'));
    const mobileTabs = Array.from(document.querySelectorAll('.mobile-tab-button'));
    const mobileNavToggle = document.getElementById('mobileNavToggle');
    const mobileTabsPanel = document.getElementById('mobileTabs');

    function showAlert(message, type = 'success') {
      alertBanner.textContent = message;
      alertBanner.classList.remove('hidden', 'border-green-300', 'border-yellow-300', 'border-red-300', 'bg-green-50', 'bg-yellow-50', 'bg-red-50', 'text-green-800', 'text-yellow-800', 'text-red-800');
      if (type === 'success') alertBanner.classList.add('border-green-300', 'bg-green-50', 'text-green-800');
      if (type === 'warning') alertBanner.classList.add('border-yellow-300', 'bg-yellow-50', 'text-yellow-800');
      if (type === 'error') alertBanner.classList.add('border-red-300', 'bg-red-50', 'text-red-800');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(() => alertBanner.classList.add('hidden'), 5000);
    }

    // Tối ưu hàm gọi API chống hoàn toàn lỗi Fetch và CORS
    async function apiGet(action) {
      try {
        const response = await fetch(`${API_URL}?action=${encodeURIComponent(action)}`, {
          method: 'GET',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        if (!response.ok) throw new Error('Không tải được dữ liệu mạng');
        return await response.json();
      } catch (error) {
        throw new Error('Lỗi kết nối API: Bạn đã deploy chọn chế độ "Anyone" và "New Version" chưa?');
      }
    }

    async function apiPost(payload) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          mode: 'cors',
          body: JSON.stringify(payload),
        });
        if (!response.ok) throw new Error('Gửi dữ liệu thất bại');
        return await response.json();
      } catch (error) {
        throw new Error('Lỗi gửi API: ' + error.message);
      }
    }

    function setLoading(isLoading) {
      state.loading = isLoading;
      render();
    }

    async function loadStudents() {
      setLoading(true);
      try { const data = await apiGet('HocSinh'); state.students = Array.isArray(data) ? data : []; } 
      catch (error) { showAlert(error.message, 'error'); } 
      finally { setLoading(false); }
    }

    async function loadTeachers() {
      setLoading(true);
      try { const data = await apiGet('GiaoVien'); state.teachers = Array.isArray(data) ? data : []; } 
      catch (error) { showAlert(error.message, 'error'); } 
      finally { setLoading(false); }
    }

    async function loadTuition() {
      setLoading(true);
      try { const data = await apiGet('HocPhi'); state.tuitionRecords = Array.isArray(data) ? data : []; } 
      catch (error) { showAlert(error.message, 'error'); } 
      finally { setLoading(false); }
    }

    async function loadMenus() {
      setLoading(true);
      try { const data = await apiGet('DinhDuong'); state.nutritionMenus = Array.isArray(data) ? data : []; } 
      catch (error) { showAlert(error.message, 'error'); } 
      finally { setLoading(false); }
    }

    function updateActiveTab(tab) {
      state.activeTab = tab;
      tabs.forEach(btn => btn.classList.toggle('bg-white/30', btn.dataset.tab === tab));
      mobileTabs.forEach(btn => btn.classList.toggle('bg-white/30', btn.dataset.tab === tab));
      render();
      if (tab === 'HocSinh') loadStudents();
      if (tab === 'GiaoVien') loadTeachers();
      if (tab === 'ChamCong') { loadStudents(); loadTeachers(); }
      if (tab === 'HocPhi') { loadTuition(); loadStudents(); }
      if (tab === 'DinhDuong') loadMenus();
      if (window.innerWidth < 640) mobileTabsPanel.classList.add('hidden');
    }

    function buildStudentTab() {
      const rows = state.students.map((row) => {
        // Đồng bộ bóc tách Object JSON từ Google Sheet
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div>
                <p class="text-slate-500 text-sm">Mã HS</p>
                <h3 class="mt-1 text-xl font-semibold text-slate-900">${row.MaHS || '-'} - ${row.TenHS || '-'}</h3>
              </div>
              <div class="flex flex-wrap gap-2">
                <span class="status-badge bg-sky-100 text-sky-700">Lớp ${row.Lop || '-'}</span>
                <span class="status-badge bg-amber-100 text-amber-800">Phụ huynh: ${row.TenPhuHuynh || '-'}</span>
              </div>
            </div>
            <div class="mt-4 grid gap-3 sm:grid-cols-3 text-sm text-slate-600">
              <div><span class="font-semibold">Ngày sinh:</span> ${row.NgaySinh || '-'}</div>
              <div><span class="font-semibold">SĐT:</span> ${row.SDT || '-'}</div>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <div>
                <h2 class="text-2xl font-bold text-slate-900">Học Sinh</h2>
                <p class="mt-2 text-slate-600">Danh sách học sinh hiện tại và thêm mới nhanh chóng.</p>
              </div>
              <div class="rounded-3xl bg-amber-100 px-4 py-3 text-amber-900 font-semibold">Tổng: ${state.students.length}</div>
            </div>
          </div>
          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="space-y-4">
              <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h3 class="text-xl font-semibold text-slate-900">Danh sách học sinh</h3>
                <div class="mt-4 space-y-4">${rows || '<p class="text-slate-500">Chưa có dữ liệu.</p>'}</div>
              </div>
            </div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <h3 class="text-xl font-semibold text-slate-900">Thêm học sinh mới</h3>
              <form id="studentForm" class="mt-5 space-y-4">
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">Mã HS<input name="MaHS" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400" /></label>
                  <label class="block text-sm font-medium text-slate-700">Tên HS<input name="TenHS" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400" /></label>
                </div>
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">Ngày sinh<input type="date" name="NgaySinh" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400" /></label>
                  <label class="block text-sm font-medium text-slate-700">Lớp<input name="Lop" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400" /></label>
                </div>
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">Tên phụ huynh<input name="TenPhuHuynh" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400" /></label>
                  <label class="block text-sm font-medium text-slate-700">SĐT<input name="SDT" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400" /></label>
                </div>
                <button type="submit" class="w-full rounded-3xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white hover:bg-sky-700">Lưu học sinh</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildTeacherTab() {
      const rows = state.teachers.map((row) => {
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div>
                <p class="text-slate-500 text-sm">Mã GV</p>
                <h3 class="mt-1 text-xl font-semibold text-slate-900">${row.MaGV || '-'} - ${row.TenGV || '-'}</h3>
              </div>
              <div class="flex flex-wrap gap-2">
                <span class="status-badge bg-sky-100 text-sky-700">Lớp phụ trách: ${row.LopPhuTrach || '-'}</span>
                <span class="status-badge bg-amber-100 text-amber-800">Lương: ${row.LuongCoBan || '-'}</span>
              </div>
            </div>
            <div class="mt-4 text-sm text-slate-600"><span class="font-semibold">SĐT:</span> ${row.SDT || '-'}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div>
                <h2 class="text-2xl font-bold text-slate-900">Giáo Viên</h2>
                <p class="mt-2 text-slate-600">Quản lý danh sách giáo viên và thêm mới nhanh.</p>
              </div>
              <div class="rounded-3xl bg-pink-100 px-4 py-3 text-pink-900 font-semibold">Tổng: ${state.teachers.length}</div>
            </div>
          </div>
          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="space-y-4">
              <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h3 class="text-xl font-semibold text-slate-900">Danh sách giáo viên</h3>
                <div class="mt-4 space-y-4">${rows || '<p class="text-slate-500">Chưa có dữ liệu.</p>'}</div>
              </div>
            </div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <h3 class="text-xl font-semibold text-slate-900">Thêm giáo viên mới</h3>
              <form id="teacherForm" class="mt-5 space-y-4">
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">Mã GV<input name="MaGV" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400" /></label>
                  <label class="block text-sm font-medium text-slate-700">Tên GV<input name="TenGV" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400" /></label>
                </div>
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">SĐT<input name="SDT" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400" /></label>
                  <label class="block text-sm font-medium text-slate-700">Lớp phụ trách<input name="LopPhuTrach" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400" /></label>
                </div>
                <label class="block text-sm font-medium text-slate-700">Lương cơ bản<input name="LuongCoBan" type="number" min="0" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400" /></label>
                <button type="submit" class="w-full rounded-3xl bg-fuchsia-500 px-5 py-3 text-sm font-semibold text-white hover:bg-fuchsia-600">Lưu giáo viên</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildAttendanceTab() {
      const targetList = state.attendanceType === 'HocSinh' ? state.students : state.teachers;
      const memberRows = targetList.map((row, index) => {
        const Ma = state.attendanceType === 'HocSinh' ? row.MaHS : row.MaGV;
        const Ten = state.attendanceType === 'HocSinh' ? row.TenHS : row.TenGV;
        const key = `${state.attendanceType}-${Ma}-${index}`;
        const currentStatus = state.attendanceStatus[key] || 'Đi học';
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <p class="text-slate-500 text-sm">${state.attendanceType === 'HocSinh' ? 'Học sinh' : 'Giáo viên'}</p>
                <h3 class="mt-1 text-lg font-semibold text-slate-900">${Ma || ''} - ${Ten || ''}</h3>
              </div>
              <div class="grid grid-cols-3 gap-2 text-sm">
                ${['Đi học', 'Nghỉ có phép', 'Vắng'].map(status => `
                  <label class="cursor-pointer rounded-2xl border border-slate-200 px-3 py-2 text-center transition ${currentStatus === status ? 'bg-sky-600 text-white' : 'bg-slate-50 text-slate-700 hover:bg-slate-100'}">
                    <input type="radio" name="${key}" value="${status}" class="hidden" ${currentStatus === status ? 'checked' : ''} onchange="state.attendanceStatus['${key}']='${status}'" />
                    ${status}
                  </label>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <div>
                <h2 class="text-2xl font-bold text-slate-900">Chấm Công</h2>
                <p class="mt-2 text-slate-600">Chọn ngày, loại thành viên và lưu nhanh trạng thái.</p>
              </div>
            </div>
          </div>
          <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <form id="attendanceForm" class="space-y-5">
              <div class="grid gap-4 sm:grid-cols-2">
                <label class="block text-sm font-medium text-slate-700">Ngày chấm công<input id="attendanceDate" type="date" value="${state.attendanceDate}" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none" /></label>
                <label class="block text-sm font-medium text-slate-700">Loại
                  <select id="attendanceType" class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none">
                    <option value="HocSinh" ${state.attendanceType === 'HocSinh' ? 'selected' : ''}>Học Sinh</option>
                    <option value="GiaoVien" ${state.attendanceType === 'GiaoVien' ? 'selected' : ''}>Giáo Viên</option>
                  </select>
                </label>
              </div>
              <div class="grid gap-4">${memberRows || '<p class="text-slate-500">Chưa có dữ liệu thành viên.</p>'}</div>
              <button type="submit" class="w-full rounded-3xl bg-amber-500 px-5 py-3 text-sm font-semibold text-white hover:bg-amber-600">Lưu chấm công</button>
            </form>
          </div>
        </div>
      `;
    }

    function buildTuitionTab() {
      const rows = state.tuitionRecords.map((row, index) => {
        return `
          <tr class="border-b border-slate-200 last:border-b-0">
            <td class="px-4 py-3 text-sm text-slate-700">${row.Thang || '-'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${row.MaHS || '-'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${row.TenHS || '-'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${row.PhiCoDinh || '0'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${row.SoNgayAn || '0'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${row.TienAn || '0'}</td>
            <td class="px-4 py-3 text-sm text-slate-700 font-bold text-sky-600">${row.TongTien || '0'}</td>
            <td class="px-4 py-3 text-sm"><span class="status-badge ${row.TrangThai === 'Đã nộp' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${row.TrangThai || 'Chưa nộp'}</span></td>
            <td class="px-4 py-3 text-right">
              <button data-index="${index}" class="update-status-btn rounded-full border border-sky-300 bg-sky-50 px-3 py-1 text-xs font-semibold text-sky-700 hover:bg-sky-100">Đổi trạng thái</button>
            </td>
          </tr>
        `;
      }).join('');

      const studentOptions = state.students.map(r => `<option value="${r.MaHS || ''}">${r.MaHS} - ${r.TenHS || ''}</option>`).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm">
            <h2 class="text-2xl font-bold text-slate-900">Học Phí</h2>
          </div>
          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm overflow-x-auto">
              <h3 class="text-xl font-semibold text-slate-900">Danh sách học phí</h3>
              <table class="w-full text-left mt-4">
                <thead class="bg-slate-50 text-slate-700 text-xs uppercase">
                  <tr>
                    <th class="px-4 py-3">Tháng</th><th class="px-4 py-3">Mã HS</th><th class="px-4 py-3">Tên HS</th>
                    <th class="px-4 py-3">Cố định</th><th class="px-4 py-3">Ngày ăn</th><th class="px-4 py-3">Tiền ăn</th>
                    <th class="px-4 py-3">Tổng</th><th class="px-4 py-3">Trạng thái</th><th class="px-4 py-3"></th>
                  </tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="9" class="p-4 text-center">Chưa có dữ liệu</td></tr>'}</tbody>
              </table>
            </div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <h3 class="text-xl font-semibold text-slate-900">Thêm dòng học phí mới</h3>
              <form id="tuitionForm" class="mt-5 space-y-4">
                <label class="block text-sm font-medium text-slate-700">Tháng<input name="Thang" placeholder="Ví dụ: 2026-05" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none" /></label>
                <label class="block text-sm font-medium text-slate-700">Chọn học sinh
                  <select name="MaHS" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none">
                    <option value="">Chọn học sinh</option>${studentOptions}
                  </select>
                </label>
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">Phí cố định<input name="PhiCoDinh" type="number" value="0" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none" /></label>
                  <label class="block text-sm font-medium text-slate-700">Số ngày ăn<input name="SoNgayAn" type="number" value="0" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none" /></label>
                </div>
                <label class="block text-sm font-medium text-slate-700">Tiền ăn (1 ngày)<input name="TienAn" type="number" value="0" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none" /></label>
                <label class="block text-sm font-medium text-slate-700">Trạng thái
                  <select name="TrangThai" class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none">
                    <option value="Chưa nộp">Chưa nộp</option><option value="Đã nộp">Đã nộp</option>
                  </select>
                </label>
                <button type="submit" class="w-full rounded-3xl bg-violet-600 px-5 py-3 text-sm font-semibold text-white hover:bg-violet-700">Lưu học phí</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildNutritionTab() {
      const rows = state.nutritionMenus.slice().reverse().map((row) => {
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
            <h3 class="text-lg font-semibold text-slate-900">Ngày: ${row.Ngay || '-'}</h3>
            <div class="mt-4 grid gap-3 sm:grid-cols-3 text-sm text-slate-700">
              <div class="rounded-2xl bg-slate-50 p-4"><p class="font-semibold text-sky-600">Bữa sáng</p><p class="mt-1">${row.BuaSang || '-'}</p></div>
              <div class="rounded-2xl bg-slate-50 p-4"><p class="font-semibold text-sky-600">Bữa trưa</p><p class="mt-1">${row.BuaTrua || '-'}</p></div>
              <div class="rounded-2xl bg-slate-50 p-4"><p class="font-semibold text-sky-600">Bữa chiều</p><p class="mt-1">${row.BuaChieu || '-'}</p></div>
            </div>
            <div class="mt-3 text-sm text-slate-500"><span class="font-semibold">Nhận xét:</span> ${row.NhanXetChung || '-'}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm">
            <h2 class="text-2xl font-bold text-slate-900">Thực Đơn Dinh Dưỡng</h2>
          </div>
          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="space-y-4">
              <h3 class="text-xl font-semibold">Lịch sử thực đơn</h3>
              ${rows || '<p class="text-slate-500">Chưa có thực đơn.</p>'}
            </div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <h3 class="text-xl font-semibold">Nhập thực đơn mới</h3>
              <form id="nutritionForm" class="mt-5 space-y-4">
                <label class="block text-sm font-medium text-slate-700">Ngày<input name="Ngay" type="date" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none" /></label>
                <label class="block text-sm font-medium text-slate-700">Bữa sáng<textarea name="BuaSang" rows="2" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none"></textarea></label>
                <label class="block text-sm font-medium text-slate-700">Bữa trưa<textarea name="BuaTrua" rows="2" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none"></textarea></label>
                <label class="block text-sm font-medium text-slate-700">Bữa chiều<textarea name="BuaChieu" rows="2" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none"></textarea></label>
                <label class="block text-sm font-medium text-slate-700">Nhận xét chung<textarea name="NhanXetChung" rows="2" class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none"></textarea></label>
                <button type="submit" class="w-full rounded-3xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white hover:bg-sky-700">Lưu thực đơn</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      if (state.loading) {
        contentArea.innerHTML = `
          <div class="flex flex-col items-center justify-center py-12 gap-3">
            <div class="h-12 w-12 animate-spin rounded-full border-4 border-slate-300 border-t-sky-600"></div>
            <p class="text-slate-500 font-medium text-sm">Đang tải dữ liệu mạng từ Google Sheet...</p>
          </div>
        `;
        return;
      }
      if (state.activeTab === 'HocSinh') contentArea.innerHTML = buildStudentTab();
      if (state.activeTab === 'GiaoVien') contentArea.innerHTML = buildTeacherTab();
      if (state.activeTab === 'ChamCong') contentArea.innerHTML = buildAttendanceTab();
      if (state.activeTab === 'HocPhi') contentArea.innerHTML = buildTuitionTab();
      if (state.activeTab === 'DinhDuong') contentArea.innerHTML = buildNutritionTab();
      attachEventListeners();
    }

    function attachEventListeners() {
      const studentForm = document.getElementById('studentForm');
      if (studentForm) {
        studentForm.submitHandler = async function(e) {
          e.preventDefault();
          const form = new FormData(e.target);
          const rowData = [form.get('MaHS'), form.get('TenHS'), form.get('NgaySinh'), form.get('Lop'), form.get('TenPhuHuynh'), form.get('SDT')];
          setLoading(true);
          try {
            await apiPost({ subAction: 'append', rowData });
            showAlert('Thêm học sinh thành công!');
            await loadStudents();
          } catch(err) { showAlert(err.message, 'error'); }
          finally { setLoading(false); }
        };
        studentForm.addEventListener('submit', studentForm.submitHandler);
      }

      const teacherForm = document.getElementById('teacherForm');
      if (teacherForm) {
        teacherForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const form = new FormData(e.target);
          const rowData = [form.get('MaGV'), form.get('TenGV'), form.get('SDT'), form.get('LopPhuTrach'), form.get('LuongCoBan')];
          setLoading(true);
          try {
            await apiPost({ subAction: 'append', rowData });
            showAlert('Thêm giáo viên thành công!');
            await loadTeachers();
          } catch(err) { showAlert(err.message, 'error'); }
          finally { setLoading(false); }
        });
      }

      const attendanceForm = document.getElementById('attendanceForm');
      if (attendanceForm) {
        const typeSelect = document.getElementById('attendanceType');
        const dateInput = document.getElementById('attendanceDate');
        typeSelect.addEventListener('change', (e) => { state.attendanceType = e.target.value; render(); });
        dateInput.addEventListener('change', (e) => { state.attendanceDate = e.target.value; });

        attendanceForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          setLoading(true);
          try {
            const list = state.attendanceType === 'HocSinh' ? state.students : state.teachers;
            for(let index = 0; index < list.length; index++) {
              const Ma = state.attendanceType === 'HocSinh' ? list[index].MaHS : list[index].MaGV;
              const Ten = state.attendanceType === 'HocSinh' ? list[index].TenHS : list[index].TenGV;
              const key = `${state.attendanceType}-${Ma}-${index}`;
              const trThai = state.attendanceStatus[key] || 'Đi học';
              
              // Đẩy dữ liệu chấm công sang sheet ChamCong
              await apiPost({
                subAction: 'append',
                rowData: [state.attendanceDate, Ma, Ten, state.attendanceType, trThai, 'Hệ thống web']
              });
            }
            showAlert('Lưu dữ liệu chấm công thành công!');
          } catch(err) { showAlert(err.message, 'error'); }
          finally { setLoading(false); }
        });
      }

      const tuitionForm = document.getElementById('tuitionForm');
      if (tuitionForm) {
        tuitionForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const form = new FormData(e.target);
          const hsSelected = state.students.find(r => r.MaHS === form.get('MaHS')) || {};
          const phiCoDinh = Number(form.get('PhiCoDinh') || 0);
          const soNgayAn = Number(form.get('SoNgayAn') || 0);
          const tienAn = Number(form.get('TienAn') || 0);
          const tongTien = phiCoDinh + (soNgayAn * tienAn);

          const rowData = [
            form.get('Thang'), form.get('MaHS'), hsSelected.TenHS || '',
            phiCoDinh, soNgayAn, tienAn, tongTien, form.get('TrangThai')
          ];
          setLoading(true);
          try {
            await apiPost({ subAction: 'append', rowData });
            showAlert('Thêm dòng học phí thành công!');
            await loadTuition();
          } catch(err) { showAlert(err.message, 'error'); }
          finally { setLoading(false); }
        });
      }

      const nutritionForm = document.getElementById('nutritionForm');
      if (nutritionForm) {
        nutritionForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const form = new FormData(e.target);
          const rowData = [form.get('Ngay'), form.get('BuaSang'), form.get('BuaTrua'), form.get('BuaChieu'), form.get('NhanXetChung')];
          setLoading(true);
          try {
            await apiPost({ subAction: 'append', rowData });
            showAlert('Thêm thực đơn thành công!');
            await loadMenus();
          } catch(err) { showAlert(err.message, 'error'); }
          finally { setLoading(false); }
        });
      }

      // Xử lý nút bấm đổi nhanh trạng thái học phí
      document.querySelectorAll('.update-status-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const idx = e.target.dataset.index;
          const record = state.tuitionRecords[idx];
          const nextStatus = record.TrangThai === 'Đã nộp' ? 'Chưa nộp' : 'Đã nộp';
          setLoading(true);
          try {
            await apiPost({
              subAction: 'update',
              keyName: 'MaHS',
              keyValue: record.MaHS,
              updateData: { 'TrangThai': nextStatus }
            });
            showAlert(`Đã chuyển trạng thái học phí sang ${nextStatus}`);
            await loadTuition();
          } catch(err) { showAlert(err.message, 'error'); }
          finally { setLoading(false); }
        });
      });
    }

    mobileNavToggle.addEventListener('click', () => mobileTabsPanel.classList.toggle('hidden'));
    tabs.forEach(button => button.addEventListener('click', () => updateActiveTab(button.dataset.tab)));
    mobileTabs.forEach(button => button.addEventListener('click', () => updateActiveTab(button.dataset.tab)));

    // Điểm khởi chạy hệ thống mượt mà
    updateActiveTab('HocSinh');
  </script>
</body>
</html>
