<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý Mầm non Thái Dương</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: light; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
    .brand-bg { background: linear-gradient(135deg, #56b2ff 0%, #83d0ff 100%); }
    .soft-card { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(16px); }
    .status-badge { display: inline-flex; align-items: center; justify-content: center; padding: 0.35rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="min-h-screen flex flex-col">
    <header class="brand-bg text-white p-4 sm:p-6 shadow-lg shadow-slate-300/20">
      <div class="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <h1 class="text-3xl font-extrabold tracking-tight">Trường Mầm non Thái Dương</h1>
          <p class="mt-2 text-slate-100/90">Quản lý học sinh, giáo viên, chấm công, học phí và dinh dưỡng.</p>
        </div>
        <button id="mobileNavToggle" class="sm:hidden rounded-full border border-slate-200/40 bg-white/10 px-4 py-2 text-sm font-semibold transition hover:bg-white/20">Menu</button>
        <nav id="tabsNav" class="hidden sm:flex gap-2 flex-wrap items-center">
          <button data-tab="HocSinh" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Học Sinh</button>
          <button data-tab="GiaoVien" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Giáo Viên</button>
          <button data-tab="ChamCong" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Chấm Công</button>
          <button data-tab="HocPhi" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Học Phí</button>
          <button data-tab="DinhDuong" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Dinh Dưỡng</button>
        </nav>
      </div>
      <div id="mobileTabs" class="sm:hidden mt-4 hidden flex-col gap-2">
        <button data-tab="HocSinh" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Học Sinh</button>
        <button data-tab="GiaoVien" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Giáo Viên</button>
        <button data-tab="ChamCong" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Chấm Công</button>
        <button data-tab="HocPhi" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Học Phí</button>
        <button data-tab="DinhDuong" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Dinh Dưỡng</button>
      </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
      <section class="space-y-6">
        <div id="alertBanner" class="hidden rounded-3xl border border-slate-300/70 bg-white shadow-sm p-4 text-sm text-slate-700"></div>
        <div id="contentArea" class="space-y-6"></div>
      </section>
    </main>
  </div>

  <script>
    // GIỮ NGUYÊN LINK GOOGLE SCRIPT CỦA BẠN
    const API_URL = "https://script.google.com/macros/s/AKfycbzH66RiU7musvItOBabE5mvVaCPIFtJSmlEkAM3LZsS-DX1tdzJJ-JM3QMiQ1COjBNt/exec";
    
    const state = {
      activeTab: 'HocSinh',
      students: [],
      teachers: [],
      attendanceType: 'HocSinh',
      attendanceDate: new Date().toISOString().slice(0, 10),
      attendanceStatus: {}, // Lưu trạng thái tích chọn hiện tại của từng thành viên
      selectedClass: '',
      tuitionRecords: [],
      nutritionMenus: [],
      loading: false,
      selectedTuitionIndex: null,
    };

    const alertBanner = document.getElementById('alertBanner');
    const contentArea = document.getElementById('contentArea');
    const tabs = Array.from(document.querySelectorAll('.tab-button'));
    const mobileTabs = Array.from(document.querySelectorAll('.mobile-tab-button'));
    const mobileNavToggle = document.getElementById('mobileNavToggle');
    const mobileTabsPanel = document.getElementById('mobileTabs');

    function showAlert(message, type = 'success') {
      alertBanner.textContent = message;
      alertBanner.className = `rounded-3xl border p-4 text-sm font-medium transition shadow-sm ${
        type === 'success' ? 'border-green-300 bg-green-50 text-green-800' :
        type === 'warning' ? 'border-yellow-300 bg-yellow-50 text-yellow-800' : 'border-red-300 bg-red-50 text-red-800'
      }`;
      alertBanner.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(() => alertBanner.classList.add('hidden'), 4000);
    }

    async function apiGet(action) {
      const response = await fetch(`${API_URL}?action=${encodeURIComponent(action)}`);
      if (!response.ok) throw new Error('Không tải được dữ liệu');
      return await response.json();
    }

    async function apiPost(payload) {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!response.ok) throw new Error('Gửi dữ liệu thất bại');
      return await response.json();
    }

    function setLoading(isLoading) {
      state.loading = isLoading;
      render();
    }

    async function loadDataForTab(tab) {
      setLoading(true);
      try {
        if (tab === 'HocSinh') {
          const data = await apiGet('HocSinh');
          state.students = Array.isArray(data) ? data : [];
        } else if (tab === 'GiaoVien') {
          const data = await apiGet('GiaoVien');
          state.teachers = Array.isArray(data) ? data : [];
        } else if (tab === 'ChamCong') {
          const sData = await apiGet('HocSinh');
          const tData = await apiGet('GiaoVien');
          state.students = Array.isArray(sData) ? sData : [];
          state.teachers = Array.isArray(tData) ? tData : [];
          // Khởi tạo trạng thái mặc định nếu chưa tồn tại
          state.students.forEach(s => { if(!state.attendanceStatus[`HocSinh-${s[0]}`]) state.attendanceStatus[`HocSinh-${s[0]}`] = 'Đi học'; });
          state.teachers.forEach(t => { if(!state.attendanceStatus[`GiaoVien-${t[0]}`]) state.attendanceStatus[`GiaoVien-${t[0]}`] = 'Đi học'; });
        } else if (tab === 'HocPhi') {
          const data = await apiGet('HocPhi');
          state.tuitionRecords = Array.isArray(data) ? data : [];
        } else if (tab === 'DinhDuong') {
          const data = await apiGet('DinhDuong');
          state.nutritionMenus = Array.isArray(data) ? data : [];
        }
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    function updateActiveTab(tab) {
      state.activeTab = tab;
      tabs.forEach(btn => btn.classList.toggle('bg-white/30', btn.dataset.tab === tab));
      mobileTabs.forEach(btn => btn.classList.toggle('bg-white/30', btn.dataset.tab === tab));
      if (window.innerWidth < 640) mobileTabsPanel.classList.add('hidden');
      loadDataForTab(tab);
    }

    // Cập nhật trạng thái chấm công trực tiếp vào bộ nhớ state khi click ô chọn
    window.setAttendance = function(type, id, val) {
      state.attendanceStatus[`${type}-${id}`] = val;
    }

    function buildStudentTab() {
      const rows = state.students.map((row) => {
        const [MaHS, TenHS, NgaySinh, Lop, TenPhuHuynh, SDT] = row;
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div>
                <p class="text-slate-500 text-sm">Mã HS</p>
                <h3 class="mt-1 text-xl font-semibold text-slate-900">${MaHS || '-'} - ${TenHS || '-'}</h3>
              </div>
              <div class="flex flex-wrap gap-2">
                <span class="status-badge bg-sky-100 text-sky-700">Lớp ${Lop || '-'}</span>
                <span class="status-badge bg-amber-100 text-amber-800">Phụ huynh: ${TenPhuHuynh || '-'}</span>
              </div>
            </div>
            <div class="mt-4 grid gap-3 sm:grid-cols-2 text-sm text-slate-600">
              <div><span class="font-semibold">Ngày sinh:</span> ${NgaySinh || '-'}</div>
              <div><span class="font-semibold">SĐT:</span> ${SDT || '-'}</div>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm flex justify-between items-center">
            <div><h2 class="text-2xl font-bold text-slate-900">Học Sinh</h2><p class="mt-1 text-slate-600">Quản lý hồ sơ gốc học sinh toàn trường.</p></div>
            <div class="rounded-2xl bg-amber-100 px-4 py-2 text-amber-900 font-semibold h-fit">Tổng: ${state.students.length}</div>
          </div>
          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="space-y-4">${rows || '<p class="text-slate-500">Chưa có học sinh nào.</p>'}</div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm h-fit">
              <h3 class="text-xl font-semibold text-slate-900 mb-4">Tiếp nhận học sinh</h3>
              <form id="studentForm" class="space-y-4">
                <input name="MaHS" placeholder="Mã HS" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="TenHS" placeholder="Tên học sinh" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input type="date" name="NgaySinh" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="Lop" placeholder="Lớp học (Ví dụ: CHỒI 2)" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="TenPhuHuynh" placeholder="Tên phụ huynh" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="SDT" placeholder="Số điện thoại" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <button type="submit" class="w-full rounded-2xl bg-sky-600 py-3 text-sm font-semibold text-white hover:bg-sky-700">Lưu thông tin</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildTeacherTab() {
      const rows = state.teachers.map((row) => {
        const [MaGV, TenGV, SDT, LopPhuTrach, LuongCoBan] = row;
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div>
                <p class="text-slate-500 text-sm">Mã GV</p>
                <h3 class="mt-1 text-xl font-semibold text-slate-900">${MaGV || '-'} - ${TenGV || '-'}</h3>
              </div>
              <div class="flex flex-wrap gap-2">
                <span class="status-badge bg-sky-100 text-sky-700">Lớp: ${LopPhuTrach || '-'}</span>
                <span class="status-badge bg-amber-100 text-amber-800">Lương: ${LuongCoBan || '-'}</span>
              </div>
            </div>
            <div class="mt-3 text-sm text-slate-600"><span class="font-semibold">SĐT:</span> ${SDT || '-'}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm flex justify-between items-center">
            <div><h2 class="text-2xl font-bold text-slate-900">Giáo Viên</h2><p class="mt-1 text-slate-600">Quản lý thông tin phân lớp nhân sự.</p></div>
            <div class="rounded-2xl bg-pink-100 px-4 py-2 text-pink-900 font-semibold h-fit">Tổng: ${state.teachers.length}</div>
          </div>
          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="space-y-4">${rows || '<p class="text-slate-500">Chưa có nhân sự giáo viên.</p>'}</div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm h-fit">
              <h3 class="text-xl font-semibold text-slate-900 mb-4">Đăng ký giáo viên</h3>
              <form id="teacherForm" class="space-y-4">
                <input name="MaGV" placeholder="Mã GV" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="TenGV" placeholder="Họ tên giáo viên" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="SDT" placeholder="Số điện thoại" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="LopPhuTrach" placeholder="Lớp được phân công" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="LuongCoBan" type="number" placeholder="Mức lương cơ bản" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <button type="submit" class="w-full rounded-2xl bg-fuchsia-600 py-3 text-sm font-semibold text-white hover:bg-fuchsia-700">Lưu nhân sự</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildAttendanceTab() {
      const allClasses = [...new Set(state.students.map(s => (s[3] || '').trim().toUpperCase()))].filter(Boolean);

      let filteredMembers = [];
      if (state.attendanceType === 'HocSinh') {
        filteredMembers = state.selectedClass 
          ? state.students.filter(s => (s[3] || '').trim().toUpperCase() === state.selectedClass.toUpperCase())
          : state.students;
      } else {
        filteredMembers = state.teachers;
      }

      const memberRows = filteredMembers.map((row) => {
        const Ma = row[0] || '';
        const Ten = row[1] || '';
        const ClassName = row[3] || '';
        const stateKey = `${state.attendanceType}-${Ma}`;
        const currentCheck = state.attendanceStatus[stateKey] || 'Đi học';

        // Gọi trực tiếp hàm window.setAttendance khi onclick để loại bỏ hoàn toàn lỗi kẹt sự kiện
        return `
          <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <div>
              <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">${state.attendanceType === 'HocSinh' ? `Học sinh - Lớp ${ClassName}` : 'Giáo viên'}</span>
              <h3 class="text-base font-bold text-slate-800 mt-0.5">${Ma} - ${Ten}</h3>
            </div>
            <div class="flex flex-wrap items-center gap-4 bg-slate-50 border px-4 py-2 rounded-2xl self-start sm:self-auto">
              <label class="flex items-center gap-2 cursor-pointer text-sm font-semibold text-emerald-700">
                <input type="radio" name="rad-${stateKey}" value="Đi học" ${currentCheck === 'Đi học' ? 'checked' : ''} onclick="window.setAttendance('${state.attendanceType}', '${Ma}', 'Đi học')" class="w-4 h-4 accent-emerald-600" /> Đi học
              </label>
              <label class="flex items-center gap-2 cursor-pointer text-sm font-semibold text-amber-700">
                <input type="radio" name="rad-${stateKey}" value="Nghỉ có phép" ${currentCheck === 'Nghỉ có phép' ? 'checked' : ''} onclick="window.setAttendance('${state.attendanceType}', '${Ma}', 'Nghỉ có phép')" class="w-4 h-4 accent-amber-600" /> Nghỉ có phép
              </label>
              <label class="flex items-center gap-2 cursor-pointer text-sm font-semibold text-rose-700">
                <input type="radio" name="rad-${stateKey}" value="Vắng" ${currentCheck === 'Vắng' ? 'checked' : ''} onclick="window.setAttendance('${state.attendanceType}', '${Ma}', 'Vắng')" class="w-4 h-4 accent-rose-600" /> Không phép
              </label>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm">
            <h2 class="text-2xl font-bold text-slate-900">Chấm Công Ứng Dụng</h2>
            <p class="mt-1 text-slate-600">Giáo viên chọn lớp và nhấn chọn trạng thái vắng, đi học trực tiếp bên dưới.</p>
          </div>
          <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm space-y-6">
            <div class="grid gap-4 sm:grid-cols-3 items-end">
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-2">Ngày chấm công</label>
                <input id="attendanceDate" type="date" value="${state.attendanceDate}" class="w-full rounded-2xl border px-4 py-2.5 text-sm bg-slate-50 outline-none" oninput="state.attendanceDate=this.value" />
              </div>
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-2">Đối tượng</label>
                <select id="attendanceType" class="w-full rounded-2xl border px-4 py-2.5 text-sm bg-slate-50 outline-none font-medium" onchange="state.attendanceType=this.value; state.selectedClass=''; loadDataForTab('ChamCong')">
                  <option value="HocSinh" ${state.attendanceType === 'HocSinh' ? 'selected' : ''}>Học Sinh (Trẻ em)</option>
                  <option value="GiaoVien" ${state.attendanceType === 'GiaoVien' ? 'selected' : ''}>Giáo Viên (Nhân sự)</option>
                </select>
              </div>
              ${state.attendanceType === 'HocSinh' ? `
                <div>
                  <label class="text-sm font-medium text-slate-700 block mb-2">Chọn Lớp Chấm Công</label>
                  <select id="classFilter" class="w-full rounded-2xl border px-4 py-2.5 text-sm bg-slate-50 outline-none font-bold text-sky-800" onchange="state.selectedClass=this.value; render()">
                    <option value="">-- Tất cả các lớp --</option>
                    ${allClasses.map(cls => `<option value="${cls}" ${state.selectedClass === cls ? 'selected' : ''}>LỚP ${cls}</option>`).join('')}
                  </select>
                </div>
              ` : '<div></div>'}
            </div>

            <div class="space-y-2 mt-4">
              ${memberRows || '<p class="text-center text-slate-400 py-6">Không thấy dữ liệu danh sách khớp bộ lọc lớp.</p>'}
            </div>

            ${filteredMembers.length ? `<button id="submitAttendanceBtn" class="w-full py-3 rounded-2xl bg-amber-500 font-semibold text-white hover:bg-amber-600 transition shadow-md">Xác Nhận & Gửi Bảng Điểm Danh</button>` : ''}
          </div>
        </div>
      `;
    }

    function buildTuitionTab() {
      const rows = state.tuitionRecords.map((row, index) => {
        const [Thang, MaHS, TenHS, PhiCoDinh, SoNgayAn, TienAn, TongTien, TrangThai] = row;
        return `
          <tr class="border-b border-slate-200 last:border-0 hover:bg-slate-50/50">
            <td class="px-4 py-3 text-sm">${Thang || '-'}</td>
            <td class="px-4 py-3 text-sm font-semibold">${MaHS || '-'}</td>
            <td class="px-4 py-3 text-sm font-medium">${TenHS || '-'}</td>
            <td class="px-4 py-3 text-sm">${PhiCoDinh || '0'}</td>
            <td class="px-4 py-3 text-sm text-center font-bold">${SoNgayAn || '0'}</td>
            <td class="px-4 py-3 text-sm">${TienAn || '0'}</td>
            <td class="px-4 py-3 text-sm font-bold text-right">${TongTien || '0'}</td>
            <td class="px-4 py-3 text-sm text-center"><span class="px-2 py-0.5 rounded-full text-xs font-bold ${TrangThai==='Đã nộp'?'bg-emerald-100 text-emerald-800':'bg-rose-100 text-rose-800'}">${TrangThai || 'Chưa nộp'}</span></td>
            <td class="px-4 py-3 text-right">
              <button onclick="window.toggleTuitionStatus(${index})" class="rounded-xl border px-3 py-1 text-xs font-semibold bg-white text-slate-700 hover:bg-slate-100">Cập nhật</button>
            </td>
          </tr>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm"><h2 class="text-2xl font-bold text-slate-900">Báo Cáo Học Phí</h2></div>
          <div class="grid gap-6 lg:grid-cols-[1.3fr_0.7fr]">
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm overflow-x-auto h-fit">
              <table class="w-full text-left border-collapse min-w-[650px]">
                <thead>
                  <tr class="bg-slate-50 text-slate-700 text-sm font-semibold border-b">
                    <th class="px-4 py-3">Tháng</th><th class="px-4 py-3">Mã HS</th><th class="px-4 py-3">Tên học sinh</th><th class="px-4 py-3">Cố định</th><th class="px-4 py-3 text-center">Ngày ăn</th><th class="px-4 py-3">Tiền ăn</th><th class="px-4 py-3 text-right">Tổng cộng</th><th class="px-4 py-3 text-center">Trạng thái</th><th class="px-4 py-3"></th>
                  </tr>
                </thead>
                <tbody class="divide-y">${rows || '<tr><td colspan="9" class="text-center py-6 text-slate-400">Chưa xuất hóa đơn nào.</td></tr>'}</tbody>
              </table>
            </div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm h-fit">
              <h3 class="text-xl font-semibold mb-4">Lập biên lai thủ công</h3>
              <form id="tuitionForm" class="space-y-4">
                <input name="Thang" placeholder="Ví dụ: 2026-05" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                <input name="MaHS" placeholder="Mã học sinh" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                <input name="TenHS" placeholder="Tên học sinh" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                <input name="PhiCoDinh" type="number" placeholder="Học phí cơ bản" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                <input name="SoNgayAn" type="number" placeholder="Số buổi ăn thực tế" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                <input name="TienAn" type="number" placeholder="Tiền ăn tổng cộng" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                <select name="TrangThai" class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none font-medium">
                  <option value="Chưa nộp">Chưa nộp</option><option value="Đã nộp">Đã nộp</option>
                </select>
                <button type="submit" class="w-full rounded-2xl bg-violet-600 py-3 text-sm font-semibold text-white hover:bg-violet-700">Phát Hành Hóa Đơn</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildNutritionTab() {
      const rows = state.nutritionMenus.slice().reverse().map((row) => {
        const [Ngay, BuaSang, BuaTrua, BuaChieu, NhanXetChung] = row;
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
            <div class="flex justify-between items-center"><h4 class="font-bold text-slate-800 text-lg">${Ngay || '-'}</h4><span class="status-badge bg-amber-100 text-amber-800">Thực đơn</span></div>
            <div class="grid gap-3 sm:grid-cols-3 text-xs text-slate-700">
              <div class="bg-slate-50 p-3 rounded-xl"><p class="font-bold text-slate-500 mb-1">Sáng</p><p>${BuaSang || '-'}</p></div>
              <div class="bg-slate-50 p-3 rounded-xl"><p class="font-bold text-slate-500 mb-1">Trưa</p><p>${BuaTrua || '-'}</p></div>
              <div class="bg-slate-50 p-3 rounded-xl"><p class="font-bold text-slate-500 mb-1">Chiều</p><p>${BuaChieu || '-'}</p></div>
            </div>
            <div class="text-xs text-slate-500 bg-slate-50 p-2 rounded-xl"><span class="font-bold">Ghi chú:</span> ${NhanXetChung || '-'}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm"><h2 class="text-2xl font-bold text-slate-900">Nhật Ký Dinh Dưỡng Bếp Ăn</h2></div>
          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="space-y-4">${rows || '<p class="text-slate-400">Chưa cập nhật thực đơn.</p>'}</div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm h-fit">
              <h3 class="text-xl font-semibold mb-4">Cập nhật thực đơn ngày</h3>
              <form id="nutritionForm" class="space-y-4">
                <input name="Ngay" type="date" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                <textarea name="BuaSang" placeholder="Bữa sáng" rows="2" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none"></textarea>
                <textarea name="BuaTrua" placeholder="Bữa trưa" rows="2" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none"></textarea>
                <textarea name="BuaChieu" placeholder="Bữa chiều" rows="2" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none"></textarea>
                <textarea name="NhanXetChung" placeholder="Ghi chú thêm" rows="2" class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none"></textarea>
                <button type="submit" class="w-full rounded-2xl bg-sky-600 py-3 text-sm font-semibold text-white hover:bg-sky-700">Đăng Thực Đơn</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      if (state.loading) {
        contentArea.innerHTML = `<div class="rounded-3xl border border-slate-200 bg-white p-12 text-center text-slate-600 font-medium shadow-sm">Đang kết nối đồng bộ dữ liệu với Máy chủ Google Drive Cloud...</div>`;
        return;
      }
      if (state.activeTab === 'HocSinh') contentArea.innerHTML = buildStudentTab();
      else if (state.activeTab === 'GiaoVien') contentArea.innerHTML = buildTeacherTab();
      else if (state.activeTab === 'ChamCong') contentArea.innerHTML = buildAttendanceTab();
      else if (state.activeTab === 'HocPhi') contentArea.innerHTML = buildTuitionTab();
      else if (state.activeTab === 'DinhDuong') contentArea.innerHTML = buildNutritionTab();
      
      bindTabForms();
    }

    function bindTabForms() {
      // Form Học Sinh
      const sf = document.getElementById('studentForm');
      if(sf) sf.addEventListener('submit', async (e) => {
        e.preventDefault(); const f = new FormData(e.target);
        setLoading(true);
        try {
          await apiPost({ action: 'HocSinh', rowData: [f.get('MaHS'), f.get('TenHS'), f.get('NgaySinh'), f.get('Lop'), f.get('TenPhuHuynh'), f.get('SDT')] });
          showAlert('Đã lưu hồ sơ học sinh mới.'); loadDataForTab('HocSinh');
        } catch(err) { showAlert(err.message, 'error'); setLoading(false); }
      });

      // Form Giáo Viên
      const tf = document.getElementById('teacherForm');
      if(tf) tf.addEventListener('submit', async (e) => {
        e.preventDefault(); const f = new FormData(e.target);
        setLoading(true);
        try {
          await apiPost({ action: 'GiaoVien', rowData: [f.get('MaGV'), f.get('TenGV'), f.get('SDT'), f.get('LopPhuTrach'), f.get('LuongCoBan')] });
          showAlert('Đã đăng ký giáo viên mới thành công.'); loadDataForTab('GiaoVien');
        } catch(err) { showAlert(err.message, 'error'); setLoading(false); }
      });

      // Nút gửi bảng chấm công độc lập
      const subAtt = document.getElementById('submitAttendanceBtn');
      if(subAtt) subAtt.addEventListener('click', async (e) => {
        e.preventDefault();
        let list = state.attendanceType === 'HocSinh'
          ? (state.selectedClass ? state.students.filter(s => (s[3] || '').trim().toUpperCase() === state.selectedClass.toUpperCase()) : state.students)
          : state.teachers;
        if(!list.length) return;
        setLoading(true);
        try {
          const promises = list.map(row => {
            const status = state.attendanceStatus[`${state.attendanceType}-${row[0]}`] || 'Đi học';
            return apiPost({ action: 'ChamCong', rowData: [state.attendanceDate, row[0], row[1], state.attendanceType, status, 'Web App Giáo Viên'] });
          });
          await Promise.all(promises);
          showAlert(`Đã lưu bảng điểm danh lên Cloud thành công.`);
          loadDataForTab('ChamCong');
        } catch(err) { showAlert(err.message, 'error'); setLoading(false); }
      });

      // Form Học Phí
      const tuf = document.getElementById('tuitionForm');
      if(tuf) tuf.addEventListener('submit', async (e) => {
        e.preventDefault(); const f = new FormData(e.target);
        const total = Number(f.get('PhiCoDinh')||0)+Number(f.get('TienAn')||0);
        setLoading(true);
        try {
          await apiPost({ action: 'HocPhi', rowData: [f.get('Thang'), f.get('MaHS'), f.get('TenHS'), f.get('PhiCoDinh'), f.get('SoNgayAn'), f.get('TienAn'), total, f.get('TrangThai')] });
          showAlert('Đã khởi tạo biên lai đóng phí.'); loadDataForTab('HocPhi');
        } catch(err) { showAlert(err.message, 'error'); setLoading(false); }
      });

      // Form Dinh Dưỡng
      const nuf = document.getElementById('nutritionForm');
      if(nuf) nuf.addEventListener('submit', async (e) => {
        e.preventDefault(); const f = new FormData(e.target);
        setLoading(true);
        try {
          await apiPost({ action: 'DinhDuong', rowData: [f.get('Ngay'), f.get('BuaSang'), f.get('BuaTrua'), f.get('BuaChieu'), f.get('NhanXetChung')] });
          showAlert('Đã phân phối thực đơn xuống ứng dụng.'); loadDataForTab('DinhDuong');
        } catch(err) { showAlert(err.message, 'error'); setLoading(false); }
      });
    }

    window.toggleTuitionStatus = async function(index) {
      const rec = state.tuitionRecords[index]; if(!rec) return;
      const nextSt = rec[7] === 'Đã nộp' ? 'Chưa nộp' : 'Đã nộp';
      const updatedRow = [...rec.slice(0, 7), nextSt];
      setLoading(true);
      try {
        await apiPost({ action: 'HocPhi', subAction: 'update', rowIndex: index, rowData: updatedRow });
        showAlert('Đã đổi trạng thái biên lai.'); loadDataForTab('HocPhi');
      } catch(err) { showAlert(err.message, 'error'); setLoading(false); }
    }

    mobileNavToggle.addEventListener('click', () => mobileTabsPanel.classList.toggle('hidden'));
    tabs.forEach(button => button.addEventListener('click', () => updateActiveTab(button.dataset.tab)));
    mobileTabs.forEach(button => button.addEventListener('click', () => updateActiveTab(button.dataset.tab)));
    
    // Tải tab mặc định khi khởi động ứng dụng
    updateActiveTab(state.activeTab);
  </script>
</body>
</html>
