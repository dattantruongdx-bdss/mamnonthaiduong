<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý Mầm non Thái Dương</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .brand-bg { background: linear-gradient(135deg, #56b2ff 0%, #83d0ff 100%); }
    .brand-border { border-color: #f7c948; }
    .brand-accent { color: #ff7fa3; }
    .soft-card { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(16px); }
    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="min-h-screen flex flex-col">
    <header class="brand-bg text-white p-4 sm:p-6 shadow-lg shadow-slate-300/20">
      <div class="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <h1 class="text-3xl font-extrabold tracking-tight">Trường Mầm non Thái Dương</h1>
          <p class="mt-2 text-slate-100/90">Quản lý học sinh, giáo viên, chấm công, học phí và dinh dưỡng.</p>
        </div>
        <button id="mobileNavToggle" class="sm:hidden rounded-full border border-slate-200/40 bg-white/10 px-4 py-2 text-sm font-semibold transition hover:bg-white/20">Menu</button>
        <nav id="tabsNav" class="hidden sm:flex gap-2 flex-wrap items-center">
          <button data-tab="HocSinh" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Học Sinh</button>
          <button data-tab="GiaoVien" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Giáo Viên</button>
          <button data-tab="ChamCong" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Chấm Công</button>
          <button data-tab="HocPhi" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Học Phí</button>
          <button data-tab="DinhDuong" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Dinh Dưỡng</button>
        </nav>
      </div>
      <div id="mobileTabs" class="sm:hidden mt-4 hidden flex-col gap-2">
        <button data-tab="HocSinh" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Học Sinh</button>
        <button data-tab="GiaoVien" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Giáo Viên</button>
        <button data-tab="ChamCong" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Chấm Công</button>
        <button data-tab="HocPhi" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Học Phí</button>
        <button data-tab="DinhDuong" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Dinh Dưỡng</button>
      </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
      <section class="space-y-6">
        <div id="alertBanner" class="hidden rounded-3xl border border-slate-300/70 bg-white shadow-sm p-4 text-sm text-slate-700"></div>
        <div id="contentArea" class="space-y-6"></div>
      </section>
    </main>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzH66RiU7musvItOBabE5mvVaCPIFtJSmlEkAM3LZsS-DX1tdzJJ-JM3QMiQ1COjBNt/exec";
    const state = {
      activeTab: 'HocSinh',
      students: [],
      teachers: [],
      attendanceType: 'HocSinh',
      attendanceDate: new Date().toISOString().slice(0, 10),
      attendanceStatus: {},
      tuitionRecords: [],
      nutritionMenus: [],
      loading: false,
      selectedTuitionIndex: null,
    };

    const alertBanner = document.getElementById('alertBanner');
    const contentArea = document.getElementById('contentArea');
    const tabs = Array.from(document.querySelectorAll('.tab-button'));
    const mobileTabs = Array.from(document.querySelectorAll('.mobile-tab-button'));
    const mobileNavToggle = document.getElementById('mobileNavToggle');
    const mobileTabsPanel = document.getElementById('mobileTabs');

    function showAlert(message, type = 'success') {
      alertBanner.textContent = message;
      alertBanner.classList.remove('hidden', 'border-green-300', 'border-yellow-300', 'border-red-300', 'bg-green-50', 'bg-yellow-50', 'bg-red-50', 'text-green-800', 'text-yellow-800', 'text-red-800');
      if (type === 'success') alertBanner.classList.add('border-green-300', 'bg-green-50', 'text-green-800');
      if (type === 'warning') alertBanner.classList.add('border-yellow-300', 'bg-yellow-50', 'text-yellow-800');
      if (type === 'error') alertBanner.classList.add('border-red-300', 'bg-red-50', 'text-red-800');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(() => alertBanner.classList.add('hidden'), 5000);
    }

    async function apiGet(action) {
      try {
        const response = await fetch(`${API_URL}?action=${encodeURIComponent(action)}`);
        if (!response.ok) throw new Error('Không tải được dữ liệu');
        return await response.json();
      } catch (error) {
        throw new Error(error.message || 'Lỗi kết nối API');
      }
    }

    async function apiPost(payload) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!response.ok) throw new Error('Gửi dữ liệu không thành công');
        return await response.json();
      } catch (error) {
        throw new Error(error.message || 'Lỗi kết nối API');
      }
    }

    function setLoading(isLoading) {
      state.loading = isLoading;
      render();
    }

    async function loadStudents() {
      setLoading(true);
      try {
        const data = await apiGet('HocSinh');
        state.students = Array.isArray(data) ? data : [];
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    async function loadTeachers() {
      setLoading(true);
      try {
        const data = await apiGet('GiaoVien');
        state.teachers = Array.isArray(data) ? data : [];
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    async function loadTuition() {
      setLoading(true);
      try {
        const data = await apiGet('HocPhi');
        state.tuitionRecords = Array.isArray(data) ? data : [];
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    async function loadMenus() {
      setLoading(true);
      try {
        const data = await apiGet('DinhDuong');
        state.nutritionMenus = Array.isArray(data) ? data : [];
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    function updateActiveTab(tab) {
      state.activeTab = tab;
      tabs.forEach(btn => btn.classList.toggle('bg-white/30', btn.dataset.tab === tab));
      mobileTabs.forEach(btn => btn.classList.toggle('bg-white/30', btn.dataset.tab === tab));
      render();
      if (tab === 'HocSinh') loadStudents();
      if (tab === 'GiaoVien') loadTeachers();
      if (tab === 'ChamCong') {
        loadStudents();
        loadTeachers();
      }
      if (tab === 'HocPhi') loadTuition();
      if (tab === 'DinhDuong') loadMenus();
      if (window.innerWidth < 640) mobileTabsPanel.classList.add('hidden');
    }

    function buildStudentTab() {
      const rows = state.students.map((row, index) => {
        const [MaHS, TenHS, NgaySinh, Lop, TenPhuHuynh, SDT] = row;
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div>
                <p class="text-slate-500 text-sm">Mã HS</p>
                <h3 class="mt-1 text-xl font-semibold text-slate-900">${MaHS || '-'} - ${TenHS || '-'}</h3>
              </div>
              <div class="flex flex-wrap gap-2">
                <span class="status-badge bg-sky-100 text-sky-700">Lớp ${Lop || '-'}</span>
                <span class="status-badge bg-amber-100 text-amber-800">Phụ huynh: ${TenPhuHuynh || '-'}</span>
              </div>
            </div>
            <div class="mt-4 grid gap-3 sm:grid-cols-3 text-sm text-slate-600">
              <div><span class="font-semibold">Ngày sinh:</span> ${NgaySinh || '-'}</div>
              <div><span class="font-semibold">SĐT:</span> ${SDT || '-'}</div>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <div>
                <h2 class="text-2xl font-bold text-slate-900">Học Sinh</h2>
                <p class="mt-2 text-slate-600">Danh sách học sinh hiện tại và thêm mới nhanh chóng.</p>
              </div>
              <div class="rounded-3xl bg-amber-100 px-4 py-3 text-amber-900 font-semibold">Tổng: ${state.students.length}</div>
            </div>
          </div>

          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="space-y-4">
              <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h3 class="text-xl font-semibold text-slate-900">Danh sách học sinh</h3>
                <div class="mt-4 space-y-4">
                  ${rows || '<p class="text-slate-500">Không có học sinh. Vui lòng thêm mới.</p>'}
                </div>
              </div>
            </div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <h3 class="text-xl font-semibold text-slate-900">Thêm học sinh mới</h3>
              <form id="studentForm" class="mt-5 space-y-4">
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">Mã HS<input name="MaHS" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                  <label class="block text-sm font-medium text-slate-700">Tên HS<input name="TenHS" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                </div>
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">Ngày sinh<input type="date" name="NgaySinh" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                  <label class="block text-sm font-medium text-slate-700">Lớp<input name="Lop" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                </div>
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">Tên phụ huynh<input name="TenPhuHuynh" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                  <label class="block text-sm font-medium text-slate-700">SĐT<input name="SDT" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                </div>
                <button type="submit" class="w-full rounded-3xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-sky-700">Lưu học sinh</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildTeacherTab() {
      const rows = state.teachers.map((row) => {
        const [MaGV, TenGV, SDT, LopPhuTrach, LuongCoBan] = row;
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div>
                <p class="text-slate-500 text-sm">Mã GV</p>
                <h3 class="mt-1 text-xl font-semibold text-slate-900">${MaGV || '-'} - ${TenGV || '-'}</h3>
              </div>
              <div class="flex flex-wrap gap-2">
                <span class="status-badge bg-sky-100 text-sky-700">Lớp phụ trách: ${LopPhuTrach || '-'}</span>
                <span class="status-badge bg-amber-100 text-amber-800">Lương: ${LuongCoBan || '-'}</span>
              </div>
            </div>
            <div class="mt-4 text-sm text-slate-600"><span class="font-semibold">SĐT:</span> ${SDT || '-'}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div>
                <h2 class="text-2xl font-bold text-slate-900">Giáo Viên</h2>
                <p class="mt-2 text-slate-600">Quản lý danh sách giáo viên và thêm mới nhanh.</p>
              </div>
              <div class="rounded-3xl bg-pink-100 px-4 py-3 text-pink-900 font-semibold">Tổng: ${state.teachers.length}</div>
            </div>
          </div>

          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="space-y-4">
              <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h3 class="text-xl font-semibold text-slate-900">Danh sách giáo viên</h3>
                <div class="mt-4 space-y-4">
                  ${rows || '<p class="text-slate-500">Chưa có giáo viên. Vui lòng thêm.</p>'}
                </div>
              </div>
            </div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <h3 class="text-xl font-semibold text-slate-900">Thêm giáo viên mới</h3>
              <form id="teacherForm" class="mt-5 space-y-4">
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">Mã GV<input name="MaGV" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                  <label class="block text-sm font-medium text-slate-700">Tên GV<input name="TenGV" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                </div>
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">SĐT<input name="SDT" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                  <label class="block text-sm font-medium text-slate-700">Lớp phụ trách<input name="LopPhuTrach" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                </div>
                <label class="block text-sm font-medium text-slate-700">Lương cơ bản<input name="LuongCoBan" type="number" min="0" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                <button type="submit" class="w-full rounded-3xl bg-fuchsia-500 px-5 py-3 text-sm font-semibold text-white transition hover:bg-fuchsia-600">Lưu giáo viên</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildAttendanceTab() {
      const memberRows = (state.attendanceType === 'HocSinh' ? state.students : state.teachers).map((row, index) => {
        const Ma = row[0] || '';
        const Ten = row[1] || '';
        const key = `${state.attendanceType}-${Ma}-${index}`;
        const currentStatus = state.attendanceStatus[key] || 'Đi học';
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <p class="text-slate-500 text-sm">${state.attendanceType === 'HocSinh' ? 'Học sinh' : 'Giáo viên'}</p>
                <h3 class="mt-1 text-lg font-semibold text-slate-900">${Ma} - ${Ten}</h3>
              </div>
              <div class="grid grid-cols-3 gap-2 text-sm">
                ${['Đi học', 'Nghỉ có phép', 'Vắng'].map(status => `
                  <label class="cursor-pointer rounded-2xl border border-slate-200 px-3 py-2 text-center transition ${currentStatus === status ? 'bg-sky-600 text-white' : 'bg-slate-50 text-slate-700 hover:bg-slate-100'}">
                    <input type="radio" name="${key}" value="${status}" class="hidden" ${currentStatus === status ? 'checked' : ''} />
                    ${status}
                  </label>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <div>
                <h2 class="text-2xl font-bold text-slate-900">Chấm Công</h2>
                <p class="mt-2 text-slate-600">Chọn ngày, loại thành viên và lưu nhanh trạng thái.</p>
              </div>
              <div class="rounded-3xl bg-sky-100 px-4 py-3 text-sky-900 font-semibold">Loại: ${state.attendanceType === 'HocSinh' ? 'Học sinh' : 'Giáo viên'}</div>
            </div>
          </div>

          <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <form id="attendanceForm" class="space-y-5">
              <div class="grid gap-4 md:grid-cols-[1fr_auto] items-end">
                <label class="block text-sm font-medium text-slate-700">Ngày chấm công<input id="attendanceDate" type="date" value="${state.attendanceDate}" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                <label class="block text-sm font-medium text-slate-700">Loại
                  <select id="attendanceType" class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100">
                    <option value="HocSinh" ${state.attendanceType === 'HocSinh' ? 'selected' : ''}>Học Sinh</option>
                    <option value="GiaoVien" ${state.attendanceType === 'GiaoVien' ? 'selected' : ''}>Giáo Viên</option>
                  </select>
                </label>
              </div>
              <div class="rounded-3xl border border-slate-200 bg-slate-50 p-4">
                <p class="text-sm text-slate-600">Chọn trạng thái cho từng thành viên. Mỗi thành viên sẽ gửi một dòng chấm công.</p>
              </div>
              <div class="grid gap-4">
                ${memberRows || '<p class="text-slate-500">Vui lòng tải dữ liệu học sinh/giáo viên lên trước.</p>'}
              </div>
              <button type="submit" class="w-full rounded-3xl bg-amber-500 px-5 py-3 text-sm font-semibold text-white transition hover:bg-amber-600">Lưu chấm công</button>
            </form>
          </div>
        </div>
      `;
    }

    function buildTuitionTab() {
      const rows = state.tuitionRecords.map((row, index) => {
        const [Thang, MaHS, TenHS, PhiCoDinh, SoNgayAn, TienAn, TongTien, TrangThai] = row;
        return `
          <tr class="border-b border-slate-200 last:border-b-0">
            <td class="px-4 py-3 text-sm text-slate-700">${Thang || '-'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${MaHS || '-'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${TenHS || '-'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${PhiCoDinh || '0'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${SoNgayAn || '0'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${TienAn || '0'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${TongTien || '0'}</td>
            <td class="px-4 py-3 text-sm text-slate-700">${TrangThai || 'Chưa nộp'}</td>
            <td class="px-4 py-3 text-right">
              <button data-index="${index}" class="update-status-btn rounded-full border border-sky-300 bg-sky-50 px-3 py-1 text-xs font-semibold text-sky-700 transition hover:bg-sky-100">Cập nhật</button>
            </td>
          </tr>
        `;
      }).join('');

      const studentOptions = state.students.map(row => `<option value="${row[0] || ''}">${row[0]} - ${row[1] || ''}</option>`).join('');

      const selectedStudent = state.students.find(r => r[0] === (state.selectedTuitionIndex !== null ? state.tuitionRecords[state.selectedTuitionIndex]?.[1] : '')) || [];
      const selectedName = selectedStudent[1] || '';

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <div>
                <h2 class="text-2xl font-bold text-slate-900">Học Phí</h2>
                <p class="mt-2 text-slate-600">Quản lý học phí theo tháng và trạng thái nộp tiền.</p>
              </div>
              <div class="rounded-3xl bg-sky-100 px-4 py-3 text-sky-900 font-semibold">Bản ghi: ${state.tuitionRecords.length}</div>
            </div>
          </div>

          <div class="grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm overflow-x-auto">
              <h3 class="text-xl font-semibold text-slate-900">Danh sách học phí</h3>
              <div class="mt-4 min-w-[700px]">
                <table class="w-full text-left text-sm text-slate-700">
                  <thead class="bg-slate-50 text-slate-700">
                    <tr>
                      <th class="px-4 py-3">Tháng</th>
                      <th class="px-4 py-3">Mã HS</th>
                      <th class="px-4 py-3">Tên HS</th>
                      <th class="px-4 py-3">Phí cố định</th>
                      <th class="px-4 py-3">Số ngày ăn</th>
                      <th class="px-4 py-3">Tiền ăn</th>
                      <th class="px-4 py-3">Tổng tiền</th>
                      <th class="px-4 py-3">Trạng thái</th>
                      <th class="px-4 py-3"></th>
                    </tr>
                  </thead>
                  <tbody>${rows || '<tr><td class="px-4 py-6 text-center text-slate-500" colspan="9">Không có dữ liệu học phí.</td></tr>'}</tbody>
                </table>
              </div>
            </div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <h3 class="text-xl font-semibold text-slate-900">Cập nhật / thêm học phí</h3>
              <form id="tuitionForm" class="mt-5 space-y-4">
                <label class="block text-sm font-medium text-slate-700">Tháng<input name="Thang" placeholder="Ví dụ: 2026-05" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                <label class="block text-sm font-medium text-slate-700">Mã HS<select name="MaHS" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100">
                  <option value="">Chọn học sinh</option>${studentOptions}
                </select></label>
                <label class="block text-sm font-medium text-slate-700">Tên HS<input name="TenHS" value="${selectedName}" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm font-medium text-slate-700">Phí cố định<input name="PhiCoDinh" type="number" min="0" value="0" step="1000" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                  <label class="block text-sm font-medium text-slate-700">Số ngày ăn<input name="SoNgayAn" type="number" min="0" value="0" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                </div>
                <label class="block text-sm font-medium text-slate-700">Tiền ăn<input name="TienAn" type="number" min="0" value="0" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                <div class="rounded-3xl border border-slate-200 bg-slate-50 p-4 text-slate-700">
                  <div class="flex items-center justify-between text-sm"><span>Phí cố định</span><span id="previewPhiCoDinh">0</span></div>
                  <div class="flex items-center justify-between text-sm"><span>Số ngày ăn</span><span id="previewSoNgayAn">0</span></div>
                  <div class="flex items-center justify-between text-sm"><span>Tiền ăn</span><span id="previewTienAn">0</span></div>
                  <div class="mt-3 flex items-center justify-between text-base font-semibold text-slate-900"><span>Tổng tiền</span><span id="previewTongTien">0</span></div>
                </div>
                <label class="block text-sm font-medium text-slate-700">Trạng thái
                  <select name="TrangThai" class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100">
                    <option value="Chưa nộp">Chưa nộp</option>
                    <option value="Đã nộp">Đã nộp</option>
                  </select>
                </label>
                <button type="submit" class="w-full rounded-3xl bg-violet-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-violet-700">Lưu học phí</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildNutritionTab() {
      const rows = state.nutritionMenus.slice().reverse().map((row) => {
        const [Ngay, BuaSang, BuaTrua, BuaChieu, NhanXetChung] = row;
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-3">
              <div>
                <p class="text-slate-500 text-sm">Ngày</p>
                <h3 class="mt-1 text-lg font-semibold text-slate-900">${Ngay || '-'}</h3>
              </div>
              <span class="status-badge bg-amber-100 text-amber-800">Thực đơn mẫu</span>
            </div>
            <div class="mt-4 grid gap-3 sm:grid-cols-3 text-sm text-slate-700">
              <div class="rounded-2xl bg-slate-50 p-4"><p class="font-semibold">Bữa sáng</p><p class="mt-2">${BuaSang || '-'}</p></div>
              <div class="rounded-2xl bg-slate-50 p-4"><p class="font-semibold">Bữa trưa</p><p class="mt-2">${BuaTrua || '-'}</p></div>
              <div class="rounded-2xl bg-slate-50 p-4"><p class="font-semibold">Bữa chiều</p><p class="mt-2">${BuaChieu || '-'}</p></div>
            </div>
            <div class="mt-4 rounded-2xl bg-slate-50 p-4 text-sm text-slate-600"><span class="font-semibold">Nhận xét:</span> ${NhanXetChung || '-'}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <div>
                <h2 class="text-2xl font-bold text-slate-900">Dinh Dưỡng</h2>
                <p class="mt-2 text-slate-600">Lưu thực đơn hàng ngày và xem lại lịch sử dễ dàng.</p>
              </div>
              <div class="rounded-3xl bg-pink-100 px-4 py-3 text-pink-900 font-semibold">Dòng: ${state.nutritionMenus.length}</div>
            </div>
          </div>

          <div class="grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <h3 class="text-xl font-semibold text-slate-900">Lịch sử thực đơn</h3>
              <div class="mt-4 space-y-4">
                ${rows || '<p class="text-slate-500">Chưa có thực đơn nào. Hãy thêm ngay.</p>'}
              </div>
            </div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <h3 class="text-xl font-semibold text-slate-900">Nhập thực đơn mới</h3>
              <form id="nutritionForm" class="mt-5 space-y-4">
                <label class="block text-sm font-medium text-slate-700">Ngày<input name="Ngay" type="date" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" /></label>
                <label class="block text-sm font-medium text-slate-700">Bữa sáng<textarea name="BuaSang" rows="2" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100"></textarea></label>
                <label class="block text-sm font-medium text-slate-700">Bữa trưa<textarea name="BuaTrua" rows="2" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100"></textarea></label>
                <label class="block text-sm font-medium text-slate-700">Bữa chiều<textarea name="BuaChieu" rows="2" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100"></textarea></label>
                <label class="block text-sm font-medium text-slate-700">Nhận xét chung<textarea name="NhanXetChung" rows="2" class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100"></textarea></label>
                <button type="submit" class="w-full rounded-3xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-sky-700">Lưu thực đơn</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      let html = '';
      if (state.loading) {
        html = `<div class="rounded-3xl border border-slate-200 bg-white p-8 text-center text-slate-700 shadow-sm">Đang tải dữ liệu...</div>`;
      } else if (state.activeTab === 'HocSinh') {
        html = buildStudentTab();
      } else if (state.activeTab === 'GiaoVien') {
        html = buildTeacherTab();
      } else if (state.activeTab === 'ChamCong') {
        html = buildAttendanceTab();
      } else if (state.activeTab === 'HocPhi') {
        html = buildTuitionTab();
      } else if (state.activeTab === 'DinhDuong') {
        html = buildNutritionTab();
      }
      contentArea.innerHTML = html;
      attachEventHandlers();
    }

    function attachEventHandlers() {
      const studentForm = document.getElementById('studentForm');
      if (studentForm) studentForm.addEventListener('submit', handleStudentSubmit);

      const teacherForm = document.getElementById('teacherForm');
      if (teacherForm) teacherForm.addEventListener('submit', handleTeacherSubmit);

      const attendanceForm = document.getElementById('attendanceForm');
      if (attendanceForm) attendanceForm.addEventListener('submit', handleAttendanceSubmit);

      const attendanceTypeSelect = document.getElementById('attendanceType');
      if (attendanceTypeSelect) attendanceTypeSelect.addEventListener('change', (event) => {
        state.attendanceType = event.target.value;
        updateActiveTab('ChamCong');
      });

      const attendanceDateInput = document.getElementById('attendanceDate');
      if (attendanceDateInput) attendanceDateInput.addEventListener('input', (event) => {
        state.attendanceDate = event.target.value;
      });

      const tuitionForm = document.getElementById('tuitionForm');
      if (tuitionForm) {
        tuitionForm.addEventListener('submit', handleTuitionSubmit);
        tuitionForm.addEventListener('input', handleTuitionPreview);
        const studentSelect = tuitionForm.querySelector('select[name="MaHS"]');
        if (studentSelect) studentSelect.addEventListener('change', (event) => {
          const selected = state.students.find(row => row[0] === event.target.value);
          const nameInput = tuitionForm.querySelector('input[name="TenHS"]');
          if (nameInput) nameInput.value = selected ? selected[1] : '';
          handleTuitionPreview();
        });
      }

      const nutritionForm = document.getElementById('nutritionForm');
      if (nutritionForm) nutritionForm.addEventListener('submit', handleNutritionSubmit);

      const updateButtons = Array.from(document.querySelectorAll('.update-status-btn'));
      updateButtons.forEach(button => button.addEventListener('click', handleTuitionUpdateStatus));

      const radioInputs = Array.from(document.querySelectorAll('input[type="radio"]'));
      radioInputs.forEach(radio => {
        radio.addEventListener('change', (event) => {
          const key = event.target.name;
          state.attendanceStatus[key] = event.target.value;
        });
      });
    }

    async function handleStudentSubmit(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const rowData = [form.get('MaHS'), form.get('TenHS'), form.get('NgaySinh'), form.get('Lop'), form.get('TenPhuHuynh'), form.get('SDT')];
      setLoading(true);
      try {
        await apiPost({ action: 'HocSinh', rowData });
        showAlert('Thêm học sinh thành công.');
        event.target.reset();
        loadStudents();
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    async function handleTeacherSubmit(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const rowData = [form.get('MaGV'), form.get('TenGV'), form.get('SDT'), form.get('LopPhuTrach'), form.get('LuongCoBan')];
      setLoading(true);
      try {
        await apiPost({ action: 'GiaoVien', rowData });
        showAlert('Thêm giáo viên thành công.');
        event.target.reset();
        loadTeachers();
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    async function handleAttendanceSubmit(event) {
      event.preventDefault();
      const members = state.attendanceType === 'HocSinh' ? state.students : state.teachers;
      if (!members.length) {
        showAlert('Không có dữ liệu để chấm công.', 'warning');
        return;
      }
      setLoading(true);
      try {
        const promises = members.map((row, index) => {
          const key = `${state.attendanceType}-${row[0]}-${index}`;
          const TrangThai = state.attendanceStatus[key] || 'Đi học';
          const rowData = [state.attendanceDate, row[0], row[1], state.attendanceType, TrangThai, 'Hệ thống'];
          return apiPost({ action: 'ChamCong', rowData });
        });
        await Promise.all(promises);
        showAlert('Đã lưu chấm công cho tất cả thành viên.');
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    function handleTuitionPreview() {
      const form = document.getElementById('tuitionForm');
      if (!form) return;
      const phi = Number(form.querySelector('input[name="PhiCoDinh"]').value || 0);
      const ngayAn = Number(form.querySelector('input[name="SoNgayAn"]').value || 0);
      const tienAn = Number(form.querySelector('input[name="TienAn"]').value || 0);
      const total = phi + ngayAn + tienAn;
      document.getElementById('previewPhiCoDinh').textContent = new Intl.NumberFormat('vi-VN').format(phi);
      document.getElementById('previewSoNgayAn').textContent = ngayAn;
      document.getElementById('previewTienAn').textContent = new Intl.NumberFormat('vi-VN').format(tienAn);
      document.getElementById('previewTongTien').textContent = new Intl.NumberFormat('vi-VN').format(total);
    }

    async function handleTuitionSubmit(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const Thang = form.get('Thang');
      const MaHS = form.get('MaHS');
      const TenHS = form.get('TenHS');
      const PhiCoDinh = form.get('PhiCoDinh');
      const SoNgayAn = form.get('SoNgayAn');
      const TienAn = form.get('TienAn');
      const TongTien = Number(PhiCoDinh || 0) + Number(SoNgayAn || 0) + Number(TienAn || 0);
      const TrangThai = form.get('TrangThai');
      if (!Thang || !MaHS || !TenHS) {
        showAlert('Vui lòng nhập đầy đủ thông tin học phí.', 'warning');
        return;
      }
      setLoading(true);
      try {
        await apiPost({ action: 'HocPhi', rowData: [Thang, MaHS, TenHS, PhiCoDinh, SoNgayAn, TienAn, TongTien, TrangThai] });
        showAlert('Lưu học phí thành công.');
        event.target.reset();
        loadTuition();
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    async function handleTuitionUpdateStatus(event) {
      const index = Number(event.currentTarget.dataset.index);
      const record = state.tuitionRecords[index];
      if (!record) return;
      const currentStatus = record[7] || 'Chưa nộp';
      const nextStatus = currentStatus === 'Đã nộp' ? 'Chưa nộp' : 'Đã nộp';
      const updatedRow = [...record.slice(0, 7), nextStatus];
      setLoading(true);
      try {
        await apiPost({ action: 'HocPhi', subAction: 'update', rowIndex: index, rowData: updatedRow });
        showAlert(`Cập nhật trạng thái thành ${nextStatus}.`);
        loadTuition();
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    async function handleNutritionSubmit(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const rowData = [form.get('Ngay'), form.get('BuaSang'), form.get('BuaTrua'), form.get('BuaChieu'), form.get('NhanXetChung')];
      if (!rowData[0] || !rowData[1] || !rowData[2] || !rowData[3]) {
        showAlert('Vui lòng nhập đủ thông tin thực đơn.', 'warning');
        return;
      }
      setLoading(true);
      try {
        await apiPost({ action: 'DinhDuong', rowData });
        showAlert('Thêm thực đơn thành công.');
        event.target.reset();
        loadMenus();
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    mobileNavToggle.addEventListener('click', () => {
      mobileTabsPanel.classList.toggle('hidden');
    });

    tabs.forEach(button => button.addEventListener('click', () => updateActiveTab(button.dataset.tab)));
    mobileTabs.forEach(button => button.addEventListener('click', () => updateActiveTab(button.dataset.tab)));

    window.addEventListener('resize', () => {
      if (window.innerWidth >= 640) mobileTabsPanel.classList.add('hidden');
    });

    updateActiveTab(state.activeTab);
  </script>
</body>
</html>
