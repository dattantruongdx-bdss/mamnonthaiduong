<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý Mầm non Thái Dương</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: light; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .brand-bg { background: linear-gradient(135deg, #56b2ff 0%, #83d0ff 100%); }
    .soft-card { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(16px); }
    .status-badge { display: inline-flex; align-items: center; justify-content: center; padding: 0.35rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="min-h-screen flex flex-col">
    <header class="brand-bg text-white p-4 sm:p-6 shadow-lg shadow-slate-300/20">
      <div class="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <h1 class="text-3xl font-extrabold tracking-tight">Trường Mầm non Thái Dương</h1>
          <p class="mt-2 text-slate-100/90">Quản lý học sinh, giáo viên, chấm công, học phí và dinh dưỡng.</p>
        </div>
        <button id="mobileNavToggle" class="sm:hidden rounded-full border border-slate-200/40 bg-white/10 px-4 py-2 text-sm font-semibold transition hover:bg-white/20">Menu</button>
        <nav id="tabsNav" class="hidden sm:flex gap-2 flex-wrap items-center">
          <button data-tab="HocSinh" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Học Sinh</button>
          <button data-tab="GiaoVien" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Giáo Viên</button>
          <button data-tab="ChamCong" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Chấm Công</button>
          <button data-tab="HocPhi" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Học Phí</button>
          <button data-tab="DinhDuong" class="tab-button rounded-2xl bg-white/15 px-4 py-2 text-sm font-semibold transition hover:bg-white/30">Dinh Dưỡng</button>
        </nav>
      </div>
      <div id="mobileTabs" class="sm:hidden mt-4 hidden flex-col gap-2">
        <button data-tab="HocSinh" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Học Sinh</button>
        <button data-tab="GiaoVien" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Giáo Viên</button>
        <button data-tab="ChamCong" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Chấm Công</button>
        <button data-tab="HocPhi" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Học Phí</button>
        <button data-tab="DinhDuong" class="mobile-tab-button rounded-2xl bg-white/15 px-4 py-3 text-left text-sm font-semibold">Dinh Dưỡng</button>
      </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
      <section class="space-y-6">
        <div id="alertBanner" class="hidden rounded-3xl border border-slate-300/70 bg-white shadow-sm p-4 text-sm text-slate-700"></div>
        <div id="contentArea" class="space-y-6"></div>
      </section>
    </main>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz0xRM4WZ4rXV9j163iLlXD3n2mUXolILG_Z7Xbk3b01IBwST1BKrcIoBS4r96HsZKT/exec";
    const state = {
      activeTab: 'HocSinh',
      students: [],
      teachers: [],
      attendanceType: 'HocSinh',
      attendanceDate: new Date().toISOString().slice(0, 10),
      attendanceStatus: {},
      tuitionRecords: [],
      nutritionMenus: [],
      loading: false,
      selectedTuitionIndex: null,
    };

    const alertBanner = document.getElementById('alertBanner');
    const contentArea = document.getElementById('contentArea');
    const tabs = Array.from(document.querySelectorAll('.tab-button'));
    const mobileTabs = Array.from(document.querySelectorAll('.mobile-tab-button'));
    const mobileNavToggle = document.getElementById('mobileNavToggle');
    const mobileTabsPanel = document.getElementById('mobileTabs');

    function showAlert(message, type = 'success') {
      alertBanner.textContent = message;
      alertBanner.className = `rounded-3xl border p-4 text-sm font-medium transition shadow-sm ${
        type === 'success' ? 'border-green-300 bg-green-50 text-green-800' :
        type === 'warning' ? 'border-yellow-300 bg-yellow-50 text-yellow-800' : 'border-red-300 bg-red-50 text-red-800'
      }`;
      alertBanner.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(() => alertBanner.classList.add('hidden'), 5000);
    }

    async function apiGet(action) {
      const response = await fetch(`${API_URL}?action=${encodeURIComponent(action)}`);
      if (!response.ok) throw new Error('Không tải được dữ liệu từ hệ thống.');
      return await response.json();
    }

    async function apiPost(payload) {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!response.ok) throw new Error('Gửi dữ liệu lên máy chủ thất bại.');
      return await response.json();
    }

    function setLoading(isLoading) {
      state.loading = isLoading;
      render();
    }

    // Gộp tất cả các hàm load bất đồng bộ tránh xung đột Render
    async function loadDataForTab(tab) {
      setLoading(true);
      try {
        if (tab === 'HocSinh') {
          const data = await apiGet('HocSinh');
          state.students = Array.isArray(data) ? data : [];
        } else if (tab === 'GiaoVien') {
          const data = await apiGet('GiaoVien');
          state.teachers = Array.isArray(data) ? data : [];
        } else if (tab === 'ChamCong') {
          const [studentData, teacherData] = await Promise.all([apiGet('HocSinh'), apiGet('GiaoVien')]);
          state.students = Array.isArray(studentData) ? studentData : [];
          state.teachers = Array.isArray(teacherData) ? teacherData : [];
        } else if (tab === 'HocPhi') {
          const [studentData, tuitionData] = await Promise.all([apiGet('HocSinh'), apiGet('HocPhi')]);
          state.students = Array.isArray(studentData) ? studentData : [];
          state.tuitionRecords = Array.isArray(tuitionData) ? tuitionData : [];
        } else if (tab === 'DinhDuong') {
          const data = await apiGet('DinhDuong');
          state.nutritionMenus = Array.isArray(data) ? data : [];
        }
      } catch (error) {
        showAlert(error.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    function updateActiveTab(tab) {
      state.activeTab = tab;
      tabs.forEach(btn => btn.classList.toggle('bg-white/30', btn.dataset.tab === tab));
      mobileTabs.forEach(btn => btn.classList.toggle('bg-white/30', btn.dataset.tab === tab));
      if (window.innerWidth < 640) mobileTabsPanel.classList.add('hidden');
      loadDataForTab(tab);
    }

    // Lắng nghe thay đổi trạng thái chấm công trực tiếp từ giao diện
    window.updateAttendanceStatus = function(key, val) {
      state.attendanceStatus[key] = val;
    };

    function buildStudentTab() {
      const rows = state.students.map((row) => {
        const [MaHS, TenHS, NgaySinh, Lop, TenPhuHuynh, SDT] = row;
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div>
                <p class="text-slate-500 text-sm">Mã HS</p>
                <h3 class="mt-1 text-xl font-semibold text-slate-900">${MaHS || '-'} - ${TenHS || '-'}</h3>
              </div>
              <div class="flex flex-wrap gap-2">
                <span class="status-badge bg-sky-100 text-sky-700">Lớp ${Lop || '-'}</span>
                <span class="status-badge bg-amber-100 text-amber-800">Phụ huynh: ${TenPhuHuynh || '-'}</span>
              </div>
            </div>
            <div class="mt-4 grid gap-3 sm:grid-cols-2 text-sm text-slate-600">
              <div><span class="font-semibold">Ngày sinh:</span> ${NgaySinh || '-'}</div>
              <div><span class="font-semibold">SĐT:</span> ${SDT || '-'}</div>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm flex justify-between items-center">
            <div><h2 class="text-2xl font-bold text-slate-900">Học Sinh</h2><p class="mt-1 text-slate-600">Quản lý và tiếp nhận hồ sơ học sinh mới.</p></div>
            <div class="rounded-2xl bg-amber-100 px-4 py-2 text-amber-900 font-semibold h-fit">Tổng: ${state.students.length}</div>
          </div>
          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="space-y-4">${rows || '<p class="text-slate-500">Không có dữ liệu học sinh.</p>'}</div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm h-fit">
              <h3 class="text-xl font-semibold text-slate-900 mb-4">Thêm học sinh</h3>
              <form id="studentForm" class="space-y-4">
                <input name="MaHS" placeholder="Mã HS" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="TenHS" placeholder="Tên học sinh" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input type="date" name="NgaySinh" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="Lop" placeholder="Lớp học" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="TenPhuHuynh" placeholder="Tên phụ huynh" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="SDT" placeholder="Số điện thoại liên hệ" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <button type="submit" class="w-full rounded-2xl bg-sky-600 py-3 text-sm font-semibold text-white hover:bg-sky-700">Lưu học sinh</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildTeacherTab() {
      const rows = state.teachers.map((row) => {
        const [MaGV, TenGV, SDT, LopPhuTrach, LuongCoBan] = row;
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div>
                <p class="text-slate-500 text-sm">Mã GV</p>
                <h3 class="mt-1 text-xl font-semibold text-slate-900">${MaGV || '-'} - ${TenGV || '-'}</h3>
              </div>
              <div class="flex flex-wrap gap-2">
                <span class="status-badge bg-sky-100 text-sky-700">Lớp: ${LopPhuTrach || '-'}</span>
                <span class="status-badge bg-amber-100 text-amber-800">Lương: ${LuongCoBan || '-'}</span>
              </div>
            </div>
            <div class="mt-3 text-sm text-slate-600"><span class="font-semibold">SĐT:</span> ${SDT || '-'}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm flex justify-between items-center">
            <div><h2 class="text-2xl font-bold text-slate-900">Giáo Viên</h2><p class="mt-1 text-slate-600">Hồ sơ danh sách cán bộ giáo viên nhà trường.</p></div>
            <div class="rounded-2xl bg-pink-100 px-4 py-2 text-pink-900 font-semibold h-fit">Tổng: ${state.teachers.length}</div>
          </div>
          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="space-y-4">${rows || '<p class="text-slate-500">Chưa có dữ liệu giáo viên.</p>'}</div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm h-fit">
              <h3 class="text-xl font-semibold text-slate-900 mb-4">Thêm giáo viên</h3>
              <form id="teacherForm" class="space-y-4">
                <input name="MaGV" placeholder="Mã GV" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="TenGV" placeholder="Họ và tên" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="SDT" placeholder="Số điện thoại" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="LopPhuTrach" placeholder="Lớp phụ trách" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <input name="LuongCoBan" type="number" placeholder="Lương cơ bản" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none focus:border-sky-400" />
                <button type="submit" class="w-full rounded-2xl bg-fuchsia-600 py-3 text-sm font-semibold text-white hover:bg-fuchsia-700">Lưu giáo viên</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildAttendanceTab() {
      const activeMembers = state.attendanceType === 'HocSinh' ? state.students : state.teachers;

      const memberRows = activeMembers.map((row, index) => {
        const Ma = row[0] || '';
        const Ten = row[1] || '';
        const key = `${state.attendanceType}-${Ma}-${index}`;
        const currentStatus = state.attendanceStatus[key] || 'Đi học';
        
        // Sửa cơ chế radio thuần: sử dụng hàm window toàn cục loại bỏ kẹt nút trên môi trường Web-App di động
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
              <p class="text-slate-400 text-xs font-bold uppercase">${state.attendanceType === 'HocSinh' ? 'Học sinh' : 'Giáo viên'}</p>
              <h3 class="text-base font-semibold text-slate-900 mt-0.5">${Ma} - ${Ten}</h3>
            </div>
            <div class="flex items-center gap-3 bg-slate-50 border p-2 rounded-2xl">
              ${['Đi học', 'Nghỉ có phép', 'Vắng'].map(status => `
                <button type="button" onclick="window.updateAttendanceStatus('${key}', '${status}'); render();" 
                  class="px-3 py-1.5 rounded-xl text-xs font-bold transition-all ${currentStatus === status ? 'bg-sky-600 text-white shadow-sm' : 'bg-white text-slate-700 hover:bg-slate-100'}">
                  ${status}
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm flex justify-between items-center">
            <div><h2 class="text-2xl font-bold text-slate-900">Chấm Công</h2><p class="mt-1 text-slate-600">Điểm danh nhanh học sinh và giáo viên hàng ngày.</p></div>
          </div>

          <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm space-y-6">
            <div class="grid gap-4 sm:grid-cols-2">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Ngày chấm công</label>
                <input id="attendanceDate" type="date" value="${state.attendanceDate}" class="w-full rounded-2xl border px-4 py-2.5 text-sm bg-slate-50 outline-none focus:border-sky-400" />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Đối tượng quản lý</label>
                <select id="attendanceType" class="w-full rounded-2xl border px-4 py-2.5 text-sm bg-slate-50 outline-none font-semibold text-slate-800 focus:border-sky-400">
                  <option value="HocSinh" ${state.attendanceType === 'HocSinh' ? 'selected' : ''}>Học Sinh (Trẻ em)</option>
                  <option value="GiaoVien" ${state.attendanceType === 'GiaoVien' ? 'selected' : ''}>Giáo Viên (Nhân sự)</option>
                </select>
              </div>
            </div>

            <div class="space-y-3 pt-2">
              ${memberRows || '<p class="text-slate-400 text-center py-6">Chưa có dữ liệu danh sách để hiển thị.</p>'}
            </div>

            ${activeMembers.length ? `<button id="submitAttendanceBtn" class="w-full rounded-2xl bg-amber-500 py-3 text-sm font-bold text-white hover:bg-amber-600 shadow-md">Xác Nhận & Lưu Bảng Chấm Công</button>` : ''}
          </div>
        </div>
      `;
    }

    function buildTuitionTab() {
      const rows = state.tuitionRecords.map((row, index) => {
        const [Thang, MaHS, TenHS, PhiCoDinh, SoNgayAn, TienAn, TongTien, TrangThai] = row;
        return `
          <tr class="border-b border-slate-200 last:border-b-0 hover:bg-slate-50/40">
            <td class="px-4 py-3 text-sm">${Thang || '-'}</td>
            <td class="px-4 py-3 text-sm font-semibold">${MaHS || '-'}</td>
            <td class="px-4 py-3 text-sm">${TenHS || '-'}</td>
            <td class="px-4 py-3 text-sm">${PhiCoDinh || '0'}</td>
            <td class="px-4 py-3 text-sm text-center">${SoNgayAn || '0'}</td>
            <td class="px-4 py-3 text-sm">${TienAn || '0'}</td>
            <td class="px-4 py-3 text-sm font-bold">${TongTien || '0'}</td>
            <td class="px-4 py-3 text-sm text-center">
              <span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${TrangThai === 'Đã nộp' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">${TrangThai || 'Chưa nộp'}</span>
            </td>
            <td class="px-4 py-3 text-right">
              <button onclick="window.handleTuitionUpdateStatus(${index})" class="rounded-xl border border-sky-300 bg-sky-50 px-3 py-1 text-xs font-semibold text-sky-700 hover:bg-sky-100">Đổi trạng thái</button>
            </td>
          </tr>
        `;
      }).join('');

      const studentOptions = state.students.map(row => `<option value="${row[0] || ''}">${row[0]} - ${row[1] || ''}</option>`).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm"><h2 class="text-2xl font-bold text-slate-900">Học Phí</h2></div>
          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm overflow-x-auto h-fit">
              <table class="w-full text-left min-w-[650px]">
                <thead>
                  <tr class="bg-slate-50 border-b text-sm font-semibold text-slate-700">
                    <th class="px-4 py-3">Tháng</th><th class="px-4 py-3">Mã HS</th><th class="px-4 py-3">Tên HS</th><th class="px-4 py-3">Cố định</th><th class="px-4 py-3 text-center">Ngày ăn</th><th class="px-4 py-3">Tiền ăn</th><th class="px-4 py-3">Tổng tiền</th><th class="px-4 py-3 text-center">Trạng thái</th><th class="px-4 py-3"></th>
                  </tr>
                </thead>
                <tbody class="divide-y">${rows || '<tr><td colspan="9" class="text-center py-6 text-slate-400">Chưa có hóa đơn học phí.</td></tr>'}</tbody>
              </table>
            </div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm h-fit">
              <h3 class="text-xl font-semibold text-slate-900 mb-4">Lập hóa đơn học phí</h3>
              <form id="tuitionForm" class="space-y-4">
                <input name="Thang" placeholder="Ví dụ: 2026-05" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                <select name="MaHS" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none font-medium">
                  <option value="">-- Chọn học sinh từ danh sách --</option>${studentOptions}
                </select>
                <input name="TenHS" placeholder="Tên học sinh (Tự động điền)" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                <div class="grid gap-4 sm:grid-cols-2">
                  <input name="PhiCoDinh" type="number" placeholder="Phí cố định" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                  <input name="SoNgayAn" type="number" placeholder="Số ngày ăn thực tế" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                </div>
                <input name="TienAn" type="number" placeholder="Tổng tiền ăn phụ phí" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                <select name="TrangThai" class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none font-medium">
                  <option value="Chưa nộp">Chưa nộp</option><option value="Đã nộp">Đã nộp</option>
                </select>
                <button type="submit" class="w-full rounded-2xl bg-violet-600 py-3 text-sm font-semibold text-white hover:bg-violet-700">Phát Hành Biên Lai</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function buildNutritionTab() {
      const rows = state.nutritionMenus.slice().reverse().map((row) => {
        const [Ngay, BuaSang, BuaTrua, BuaChieu, NhanXetChung] = row;
        return `
          <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
            <div class="flex justify-between items-center"><h4 class="font-bold text-slate-800 text-lg">${Ngay || '-'}</h4><span class="status-badge bg-amber-100 text-amber-800">Thực đơn</span></div>
            <div class="grid gap-3 sm:grid-cols-3 text-xs text-slate-700">
              <div class="bg-slate-50 p-3 rounded-xl"><p class="font-bold text-slate-500 mb-1">Sáng</p><p>${BuaSang || '-'}</p></div>
              <div class="bg-slate-50 p-3 rounded-xl"><p class="font-bold text-slate-500 mb-1">Trưa</p><p>${BuaTrua || '-'}</p></div>
              <div class="bg-slate-50 p-3 rounded-xl"><p class="font-bold text-slate-500 mb-1">Chiều</p><p>${BuaChieu || '-'}</p></div>
            </div>
            <div class="text-xs text-slate-500 bg-slate-50 p-2 rounded-xl"><span class="font-bold">Ghi chú:</span> ${NhanXetChung || '-'}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="grid gap-6">
          <div class="rounded-3xl soft-card border border-slate-200 p-6 shadow-sm"><h2 class="text-2xl font-bold text-slate-900">Dinh Dưỡng Bếp Ăn</h2></div>
          <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="space-y-4">${rows || '<p class="text-slate-400">Chưa có lịch sử thực đơn.</p>'}</div>
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm h-fit">
              <h3 class="text-xl font-semibold mb-4">Cập nhật thực đơn</h3>
              <form id="nutritionForm" class="space-y-4">
                <input name="Ngay" type="date" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none" />
                <textarea name="BuaSang" placeholder="Bữa sáng" rows="2" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none"></textarea>
                <textarea name="BuaTrua" placeholder="Bữa trưa" rows="2" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none"></textarea>
                <textarea name="BuaChieu" placeholder="Bữa chiều" rows="2" required class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none"></textarea>
                <textarea name="NhanXetChung" placeholder="Nhận xét / Lưu ý thêm" rows="2" class="w-full rounded-2xl border px-4 py-3 text-sm bg-slate-50 outline-none"></textarea>
                <button type="submit" class="w-full rounded-2xl bg-sky-600 py-3 text-sm font-semibold text-white hover:bg-sky-700">Đăng Thực Đơn</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      if (state.loading) {
        contentArea.innerHTML = `<div class="rounded-3xl border border-slate-200 bg-white p-12 text-center text-slate-600 font-semibold shadow-sm animate-pulse">Đang đồng bộ dữ liệu với hệ thống Google Sheets Cloud...</div>`;
        return;
      }
      if (state.activeTab === 'HocSinh') contentArea.innerHTML = buildStudentTab();
      else if (state.activeTab === 'GiaoVien') contentArea.innerHTML = buildTeacherTab();
      else if (state.activeTab === 'ChamCong') contentArea.innerHTML = buildAttendanceTab();
      else if (state.activeTab === 'HocPhi') contentArea.innerHTML = buildTuitionTab();
      else if (state.activeTab === 'DinhDuong') contentArea.innerHTML = buildNutritionTab();
      
      attachEventHandlers();
    }

    function attachEventHandlers() {
      // Học Sinh Submit
      const sf = document.getElementById('studentForm');
      if (sf) sf.addEventListener('submit', async (e) => {
        e.preventDefault(); const f = new FormData(e.target);
        setLoading(true);
        try {
          await apiPost({ action: 'HocSinh', rowData: [f.get('MaHS'), f.get('TenHS'), f.get('NgaySinh'), f.get('Lop'), f.get('TenPhuHuynh'), f.get('SDT')] });
          showAlert('Đã tiếp nhận học sinh mới.'); loadDataForTab('HocSinh');
        } catch (err) { showAlert(err.message, 'error'); setLoading(false); }
      });

      // Giáo Viên Submit
      const tf = document.getElementById('teacherForm');
      if (tf) tf.addEventListener('submit', async (e) => {
        e.preventDefault(); const f = new FormData(e.target);
        setLoading(true);
        try {
          await apiPost({ action: 'GiaoVien', rowData: [f.get('MaGV'), f.get('TenGV'), f.get('SDT'), f.get('LopPhuTrach'), f.get('LuongCoBan')] });
          showAlert('Đã lưu dữ liệu giáo viên mới.'); loadDataForTab('GiaoVien');
        } catch (err) { showAlert(err.message, 'error'); setLoading(false); }
      });

      // Chấm Công Cấu Hình Bộ Lọc (Đã sửa tách riêng biệt khỏi updateActiveTab tránh Loop)
      const attType = document.getElementById('attendanceType');
      if (attType) attType.addEventListener('change', (e) => {
        state.attendanceType = e.target.value;
        render(); 
      });

      const attDate = document.getElementById('attendanceDate');
      if (attDate) attDate.addEventListener('input', (e) => { state.attendanceDate = e.target.value; });

      // Nút gửi Submit bảng chấm công tổng
      const subAtt = document.getElementById('submitAttendanceBtn');
      if (subAtt) subAtt.addEventListener('click', async (e) => {
        e.preventDefault();
        const members = state.attendanceType === 'HocSinh' ? state.students : state.teachers;
        if (!members.length) return;
        setLoading(true);
        try {
          const promises = members.map((row, index) => {
            const key = `${state.attendanceType}-${row[0]}-${index}`;
            const status = state.attendanceStatus[key] || 'Đi học';
            return apiPost({ action: 'ChamCong', rowData: [state.attendanceDate, row[0], row[1], state.attendanceType, status, 'Web App'] });
          });
          await Promise.all(promises);
          showAlert('Đã đồng bộ dữ liệu điểm danh thành công.');
          loadDataForTab('ChamCong');
        } catch (err) { showAlert(err.message, 'error'); setLoading(false); }
      });

      // Học Phí Auto-Fill tên và Submit
      const tuf = document.getElementById('tuitionForm');
      if (tuf) {
        const selStudent = tuf.querySelector('select[name="MaHS"]');
        if (selStudent) selStudent.addEventListener('change', (e) => {
          const targetStudent = state.students.find(r => r[0] === e.target.value);
          const nameInp = tuf.querySelector('input[name="TenHS"]');
          if (nameInp) nameInp.value = targetStudent ? targetStudent[1] : '';
        });

        tuf.addEventListener('submit', async (e) => {
          e.preventDefault(); const f = new FormData(e.target);
          const total = Number(f.get('PhiCoDinh') || 0) + Number(f.get('TienAn') || 0);
          setLoading(true);
          try {
            await apiPost({ action: 'HocPhi', rowData: [f.get('Thang'), f.get('MaHS'), f.get('TenHS'), f.get('PhiCoDinh'), f.get('SoNgayAn'), f.get('TienAn'), total, f.get('TrangThai')] });
            showAlert('Đã khởi tạo biên lai đóng tiền.'); loadDataForTab('HocPhi');
          } catch (err) { showAlert(err.message, 'error'); setLoading(false); }
        });
      }

      // Thực Đơn Submit
      const nuf = document.getElementById('nutritionForm');
      if (nuf) nuf.addEventListener('submit', async (e) => {
        e.preventDefault(); const f = new FormData(e.target);
        setLoading(true);
        try {
          await apiPost({ action: 'DinhDuong', rowData: [f.get('Ngay'), f.get('BuaSang'), f.get('BuaTrua'), f.get('BuaChieu'), f.get('NhanXetChung')] });
          showAlert('Cập nhật thực đơn thành công.'); loadDataForTab('DinhDuong');
        } catch (err) { showAlert(err.message, 'error'); setLoading(false); }
      });
    }

    // Đổi trạng thái học phí từ danh sách bảng
    window.handleTuitionUpdateStatus = async function(index) {
      const record = state.tuitionRecords[index]; if (!record) return;
      const nextStatus = record[7] === 'Đã nộp' ? 'Chưa nộp' : 'Đã nộp';
      const updatedRow = [...record.slice(0, 7), nextStatus];
      setLoading(true);
      try {
        await apiPost({ action: 'HocPhi', subAction: 'update', rowIndex: index, rowData: updatedRow });
        showAlert(`Đã chuyển trạng thái đóng phí sang: ${nextStatus}`);
        loadDataForTab('HocPhi');
      } catch (err) { showAlert(err.message, 'error'); setLoading(false); }
    };

    mobileNavToggle.addEventListener('click', () => mobileTabsPanel.classList.toggle('hidden'));
    tabs.forEach(button => button.addEventListener('click', () => updateActiveTab(button.dataset.tab)));
    mobileTabs.forEach(button => button.addEventListener('click', () => updateActiveTab(button.dataset.tab)));
    
    // Tải tab mặc định khi ứng dụng khởi chạy
    updateActiveTab(state.activeTab);
  </script>
</body>
</html>
